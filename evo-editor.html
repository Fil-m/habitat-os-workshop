<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Evo-Engine 3D Editor PoC</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/evo-editor.css">
</head>
<body>

  <header>
    <div class="title">⬡ Evo-Engine Voxel Editor</div>
    <a href="index.html" style="color: #8890b0; text-decoration: none; font-size: 14px;">Exit</a>
  </header>

  <div class="toolbar">
    <button class="tool-btn active" id="tool-add">✏️ Додати</button>
    <button class="tool-btn" id="tool-erase">🧹 Ластик</button>
    <button class="tool-btn" style="opacity: 0.5;">🪣 Заливка (WIP)</button>
    <button class="tool-btn" style="opacity: 0.5;">📷 3D Камера</button>
  </div>

  <div class="viewport" id="viewport">
    <div class="debug-info" id="debug-info">Voxels: 0 | Faces: 0</div>
    <div class="scene" id="scene">
      <div class="grid-floor"></div>
      <!-- Voxels will be injected here -->
    </div>
  </div>

  <div class="bottom-panel">
    <div class="tabs">
      <div class="tab active" data-target="tab-palette">Палітра</div>
      <div class="tab" data-target="tab-layers">Шари</div>
      <div class="tab" data-target="tab-entities">Об'єкти</div>
    </div>
    
    <div class="tab-content active" id="tab-palette">
      <div class="palette">
        <div class="color-btn active" style="background-color: #00f0ff;" data-color="#00f0ff"></div>
        <div class="color-btn" style="background-color: #ff00e5;" data-color="#ff00e5"></div>
        <div class="color-btn" style="background-color: #ffcc00;" data-color="#ffcc00"></div>
        <div class="color-btn" style="background-color: #00ff88;" data-color="#00ff88"></div>
        <div class="color-btn" style="background-color: #ff3355;" data-color="#ff3355"></div>
        <div class="color-btn" style="background-color: #e0e4f0;" data-color="#e0e4f0"></div>
        <div class="color-btn" style="background-color: #505570;" data-color="#505570"></div>
        <div class="color-btn" style="background-color: #262b50;" data-color="#262b50"></div>
      </div>
    </div>
    
    <div class="tab-content" id="tab-layers">
      <p style="color: #8890b0; font-size: 14px;">Пошаровий режим в розробці. Наразі ви можете будувати 3D світ вільно, ставлячи блоки один на одного.</p>
    </div>
    
    <div class="tab-content" id="tab-entities">
      <p style="color: #8890b0; font-size: 14px;">Ігрові сутності (Гравець, Вороги, Тригери) з'являться після повної інтеграції з Етапом 1-3.</p>
    </div>
  </div>

  <script src="js/evo-engine.js"></script>
</body>
</html>
