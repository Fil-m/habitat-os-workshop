
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evo-Engine</title>
  <style>
    :root {
      --bg: #000;
      --neon: #0f0;
      --neon-blue: #00f;
      --neon-pink: #f0f;
      --text: #0f0;
      --border: #0f0;
      --btn-bg: #111;
      --btn-hover: #222;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      color: var(--text);
    }
    body {
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }
    header {
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    h1 {
      font-size: 1.4em;
      text-shadow: 0 0 5px var(--neon);
    }
    main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .tab-content {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    .tab-content.active {
      display: flex;
    }
    .nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(0, 0, 0, 0.9);
      padding: 10px 0;
      border-top: 1px solid var(--border);
      position: absolute;
      bottom: 0;
      width: 100%;
      z-index: 10;
    }
    .nav button {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9em;
      cursor: pointer;
      transition: all 0.3s;
      width: 20%;
    }
    .nav button:hover {
      background: var(--btn-hover);
      box-shadow: 0 0 8px var(--neon);
    }
    .mode-switch {
      display: flex;
      justify-content: center;
      margin: 10px 0;
      gap: 10px;
    }
    .mode-switch button {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.8em;
      cursor: pointer;
    }
    .mode-switch button.active {
      background: var(--neon);
      color: #000;
    }
    #editor-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #scene-canvas {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      margin: 10px;
      position: relative;
    }
    #text-editor, #entity-editor {
      padding: 10px;
      background: #111;
      border: 1px solid var(--border);
      margin: 10px;
      border-radius: 4px;
      overflow-y: auto;
      flex: 1;
    }
    .node-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 10px 0;
    }
    .node-btn {
      padding: 6px 10px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.8em;
      cursor: pointer;
    }
    .node-btn:hover {
      box-shadow: 0 0 5px var(--neon-blue);
    }
    input, textarea, select {
      background: #222;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      border-radius: 4px;
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .component-list {
      margin: 10px 0;
    }
    .component-item {
      margin: 5px 0;
      padding: 8px;
      background: #222;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #111;
      margin: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .chat-input {
      display: flex;
      padding: 10px;
    }
    .chat-input input {
      flex: 1;
      margin-right: 5px;
    }
    .chat-input button {
      width: 60px;
    }
    .profile-card {
      margin: 20px auto;
      padding: 20px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 300px;
      text-align: center;
    }
    .profile-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--neon);
      margin-bottom: 10px;
    }
    .mining-area {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #mining-canvas {
      flex: 1;
      background: #000;
      margin: 10px;
      border: 1px solid var(--border);
    }
    .mining-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
    }
    .mining-controls button {
      padding: 8px 16px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }
    .mining-controls button:hover {
      box-shadow: 0 0 8px var(--neon-pink);
    }
    #text-player {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #text-display {
      flex: 1;
      padding: 20px;
      background: #000;
      margin: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-y: auto;
      font-size: 1.1em;
      line-height: 1.5;
    }
    #text-choices {
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
    }
    .choice-btn {
      padding: 12px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .choice-btn:hover {
      background: #222;
      box-shadow: 0 0 8px var(--neon-blue);
    }
    .back-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 20;
    }
    .back-btn:hover {
      background: #222;
    }
    #layer-selector {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px;
      border-radius: 4px;
    }
    #layer-selector select {
      margin: 0;
      width: auto;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <header>
    <h1>Evo-Engine</h1>
  </header>

  <main>
    <!-- Грати -->
    <div id="play-tab" class="tab-content active">
      <div id="text-player">
        <div id="text-display">Ласкаво просимо до Evo-Engine. Оберіть сцену для гри.</div>
        <div id="text-choices"></div>
      </div>
    </div>

    <!-- Створити -->
    <div id="create-tab" class="tab-content">
      <div class="mode-switch">
        <button id="mode-text" class="mode-btn active">Текст</button>
        <button id="mode-2d" class="mode-btn">2D</button>
        <button id="mode-3d" class="mode-btn">3D</button>
      </div>
      <div id="editor-container">
        <div id="scene-canvas"></div>
        <div id="text-editor" class="hidden">
          <h3>Текстовий Редактор</h3>
          <div class="node-list">
            <button class="node-btn" data-type="TextNode">TextNode</button>
            <button class="node-btn" data-type="ChoiceNode">ChoiceNode</button>
            <button class="node-btn" data-type="ConditionNode">ConditionNode</button>
            <button class="node-btn" data-type="ActionNode">ActionNode</button>
            <button class="node-btn" data-type="EventNode">EventNode</button>
            <button class="node-btn" data-type="SceneSwitchNode">SceneSwitchNode</button>
            <button class="node-btn" data-type="WaitNode">WaitNode</button>
            <button class="node-btn" data-type="ImageNode">ImageNode</button>
            <button class="node-btn" data-type="AudioNode">AudioNode</button>
          </div>
          <input type="text" id="node-id" placeholder="ID вузла" />
          <textarea id="node-text" placeholder="Текст (може містити {змінні})"></textarea>
          <div id="choices-container" class="hidden">
            <h4>Варіанти вибору</h4>
            <div id="choices-list"></div>
            <button id="add-choice">+ Додати варіант</button>
          </div>
          <div id="condition-container" class="hidden">
            <h4>Умови</h4>
            <div id="conditions-list"></div>
            <button id="add-condition">+ Додати умову</button>
          </div>
          <input type="text" id="node-action" placeholder="Дія (наприклад: health += 10)" class="hidden" />
          <input type="text" id="node-event" placeholder="Назва події" class="hidden" />
          <input type="text" id="node-target" placeholder="Ціль (ID сцени або вузла)" class="hidden" />
          <input type="number" id="node-wait" placeholder="Час очікування (сек)" class="hidden" />
          <input type="text" id="node-image" placeholder="URL зображення" class="hidden" />
          <input type="text" id="node-audio" placeholder="URL аудіо" class="hidden" />
          <div class="flex-row" style="gap: 10px;">
            <button id="save-node">Зберегти вузол</button>
            <button id="load-scene">Завантажити сцену</button>
            <button id="play-scene">▶ Грати</button>
          </div>
        </div>
        <div id="entity-editor">
          <h3>Редактор сутностей</h3>
          <input type="text" id="entity-id" placeholder="ID сутності" />
          <input type="text" id="entity-name" placeholder="Назва" />
          <div class="component-list" id="components-list">
            <!-- Components will be added here -->
          </div>
          <button id="add-component">+ Додати компонент</button>
          <button id="save-entity">Зберегти сутність</button>
        </div>
      </div>
    </div>

    <!-- Майнери -->
    <div id="miners-tab" class="tab-content">
      <div class="mining-area">
        <canvas id="mining-canvas"></canvas>
        <div class="mining-controls">
          <button id="start-mining">▶ Почати</button>
          <button id="stop-mining">⏹ Зупинити</button>
          <button id="upgrade-miner">⬆ Апгрейд</button>
        </div>
      </div>
    </div>

    <!-- Чат -->
    <div id="chat-tab" class="tab-content">
      <div class="chat-messages" id="chat-messages">
        <div>Добро пожаловать в чат Evo-Engine!</div>
      </div>
      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Напишіть повідомлення..." />
        <button id="send-chat">Надіслати</button>
      </div>
    </div>

    <!-- Профіль -->
    <div id="profile-tab" class="tab-content">
      <div class="profile-card">
        <img src="https://via.placeholder.com/80" alt="Avatar" />
        <h3 id="username">Гравець</h3>
        <p>Рівень: <span id="level">1</span></p>
        <p>Досвід: <span id="xp">0</span>/100</p>
        <button id="edit-profile">Редагувати</button>
      </div>
    </div>
  </main>

  <div class="nav">
    <button data-tab="play-tab">🎮 Грати</button>
    <button data-tab="create-tab">🔧 Створити</button>
    <button data-tab="miners-tab">⛏ Майнери</button>
    <button data-tab="chat-tab">💬 Чат</button>
    <button data-tab="profile-tab">👤 Профіль</button>
  </div>

  <button class="back-btn hidden" id="back-button">← Назад</button>
  <div id="layer-selector" class="hidden">
    <select id="layer-select">
      <option value="0">Шар 0</option>
      <option value="1">Шар 1</option>
      <option value="2">Шар 2</option>
      <option value="3">Шар 3</option>
      <option value="4">Шар 4</option>
    </select>
  </div>

  <script>
    // State
    const state = {
      currentTab: 'play-tab',
      currentMode: 'text',
      currentNodeId: null,
      sceneGraph: {},
      entities: {},
      variables: { health: 100, gold: 0, reputation: 50 },
      chatHistory: [],
      profile: { username: 'Гравець', level: 1, xp: 0 },
      mining: { active: false, level: 1, progress: 0 },
      currentScene: null,
      dialogStack: [],
      currentLayer: 0,
      isPlayingScene: false
    };

    // DOM Elements
    const tabs = document.querySelectorAll('.tab-content');
    const navButtons = document.querySelectorAll('.nav button');
    const modeButtons = document.querySelectorAll('.mode-btn');
    const backBtn = document.getElementById('back-button');
    const layerSelector = document.getElementById('layer-selector');
    const sceneCanvas = document.getElementById('scene-canvas');
    const textEditor = document.getElementById('text-editor');
    const entityEditor = document.getElementById('entity-editor');
    const textPlayer = document.getElementById('text-player');
    const textDisplay = document.getElementById('text-display');
    const textChoices = document.getElementById('text-choices');
    const layerSelect = document.getElementById('layer-select');

    // Navigation
    navButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.getAttribute('data-tab');
        openTab(tabId);
      });
    });

    function openTab(tabId) {
      tabs.forEach(tab => {
        tab.classList.remove('active');
      });
      document.getElementById(tabId).classList.add('active');
      state.currentTab = tabId;
      backBtn.classList.add('hidden');
      if (tabId === 'create-tab') {
        initSceneCanvas();
      } else if (tabId === 'play-tab') {
        renderTextPlayer();
      }
    }

    // Mode Switching
    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        modeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.currentMode = btn.id.replace('mode-', '');
        initSceneCanvas();
      });
    });

    // Back Button
    backBtn.addEventListener('click', () => {
      if (state.currentTab === 'play-tab' && state.isPlayingScene) {
        exitTextScene();
      } else {
        openTab('create-tab');
      }
    });

    // Scene Canvas
    function initSceneCanvas() {
      const ctx = sceneCanvas.getContext('2d');
      sceneCanvas.width = sceneCanvas.offsetWidth;
      sceneCanvas.height = sceneCanvas.offsetHeight;
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, sceneCanvas.width, sceneCanvas.height);
      ctx.strokeStyle = '#0f0';
      ctx.strokeRect(0, 0, sceneCanvas.width, sceneCanvas.height);

      if (state.currentMode === '2d') {
        draw2DGrid(ctx);
        setup2DInput();
      } else if (state.currentMode === '3d') {
        layerSelector.classList.remove('hidden');
        draw3DLayer(ctx);
        setup3DInput();
      } else {
        layerSelector.classList.add('hidden');
        ctx.fillStyle = '#00f';
        ctx.font = '20px monospace';
        ctx.fillText('TEXT MODE EDITOR', 20, 40);
      }
    }

    function draw2DGrid(ctx) {
      const size = 32;
      const cols = Math.floor(sceneCanvas.width / size);
      const rows = Math.floor(sceneCanvas.height / size);
      ctx.clearRect(0, 0, sceneCanvas.width, sceneCanvas.height);
      for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
          ctx.strokeRect(x * size, y * size, size, size);
        }
      }
    }

    function draw3DLayer(ctx) {
      const size = 20;
      const cols = Math.floor(sceneCanvas.width / size);
      const rows = Math.floor(sceneCanvas.height / size);
      ctx.clearRect(0, 0, sceneCanvas.width, sceneCanvas.height);
      for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
          ctx.strokeRect(x * size, y * size, size, size);
        }
      }
      ctx.fillStyle = '#f0f';
      ctx.font = '14px monospace';
      ctx.fillText(`Шар: ${state.currentLayer}`, 10, 20);
    }

    function setup2DInput() {
      sceneCanvas.onmousedown = (e) => {
        const rect = sceneCanvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / 32);
        const y = Math.floor((e.clientY - rect.top) / 32);
        alert(`Тайл (${x}, ${y})`);
      };
    }

    function setup3DInput() {
      layerSelect.onchange = () => {
        state.currentLayer = parseInt(layerSelect.value);
        initSceneCanvas();
      };
      sceneCanvas.onmousedown = (e) => {
        const rect = sceneCanvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / 20);
        const y = Math.floor((e.clientY - rect.top) / 20);
        alert(`Воксель (${x}, ${y}, ${state.currentLayer})`);
      };
    }

    // Text Editor
    document.querySelectorAll('.node-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.getAttribute('data-type');
        createNewNode(type);
      });
    });

    function createNewNode(type) {
      document.querySelectorAll('#text-editor > div[id$="-container"]').forEach(el => {
        el.classList.add('hidden');
      });
      document.querySelectorAll('#text-editor input, #text-editor textarea').forEach(el => {
        el.classList.remove('hidden');
      });
      document.getElementById('choices-container').classList.add('hidden');
      document.getElementById('condition-container').classList.add('hidden');
      document.getElementById('node-action').classList.add('hidden');
      document.getElementById('node-event').classList.add('hidden');
      document.getElementById('node-target').classList.add('hidden');
      document.getElementById('node-wait').classList.add('hidden');
      document.getElementById('node-image').classList.add('hidden');
      document.getElementById('node-audio').classList.add('hidden');

      if (type === 'ChoiceNode') {
        document.getElementById('choices-container').classList.remove('hidden');
        addChoiceField();
      } else if (type === 'ConditionNode') {
        document.getElementById('condition-container').classList.remove('hidden');
        addConditionField();
      } else if (type === 'ActionNode') {
        document.getElementById('node-action').classList.remove('hidden');
        document.getElementById('node-target').classList.remove('hidden');
      } else if (type === 'EventNode') {
        document.getElementById('node-event').classList.remove('hidden');
        document.getElementById('node-target').classList.remove('hidden');
      } else if (type === 'SceneSwitchNode') {
        document.getElementById('node-target').classList.remove('hidden');
      } else if (type === 'WaitNode') {
        document.getElementById('node-wait').classList.remove('hidden');
      } else if (type === 'ImageNode') {
        document.getElementById('node-image').classList.remove('hidden');
      } else if (type === 'AudioNode') {
        document.getElementById('node-audio').classList.remove('hidden');
      }

      state.currentNodeId = null;
      document.getElementById('node-id').value = '';
      document.getElementById('node-text').value = '';
    }

    document.getElementById('add-choice').addEventListener('click', addChoiceField);
    function addChoiceField() {
      const container = document.getElementById('choices-list');
      const div = document.createElement('div');
      div.className = 'choice-item';
      div.innerHTML = `
        <input type="text" placeholder="Текст кнопки" style="width:40%" />
        <input type="text" placeholder="Умова (напр. gold>=10)" style="width:30%" />
        <input type="text" placeholder="Дія" style="width:30%" />
        <input type="text" placeholder="Ціль (ID)" style="width:30%; margin-top:5px" />
      `;
      container.appendChild(div);
    }

    document.getElementById('add-condition').addEventListener('click', addConditionField);
    function addConditionField() {
      const container = document.getElementById('conditions-list');
      const div = document.createElement('div');
      div.className = 'condition-item';
      div.innerHTML = `
        <input type="text" placeholder="Перевірка (напр. health>50)" style="width:40%" />
        <input type="text" placeholder="Ціль (ID)" style="width:40%" />
        <label><input type="checkbox" /> За замовчуванням</label>
      `;
      container.appendChild(div);
    }

    document.getElementById('save-node').addEventListener('click', saveNode);
    function saveNode() {
      const id = document.getElementById('node-id').value || `node_${Date.now()}`;
      const type = document.querySelector('.node-btn.active')?.getAttribute('data-type') || 'TextNode';
      const text = document.getElementById('node-text').value;

      const node = { id, type };

      if (type === 'TextNode' || type === 'ImageNode' || type === 'AudioNode') {
        node.text = text;
      }
      if (type === 'ImageNode') {
        node.image = document.getElementById('node-image').value;
      }
      if (type === 'AudioNode') {
        node.audio = document.getElementById('node-audio').value;
      }
      if (type === 'ChoiceNode') {
        node.choices = [];
        document.querySelectorAll('#choices-list .choice-item').forEach(item => {
          const inputs = item.querySelectorAll('input');
          node.choices.push({
            label: inputs[0].value,
            condition: inputs[1].value,
            action: inputs[2].value,
            target: inputs[3].value
          });
        });
      }
      if (type === 'ConditionNode') {
        node.conditions = [];
        document.querySelectorAll('#conditions-list .condition-item').forEach(item => {
          const inputs = item.querySelectorAll('input');
          const cond = inputs[2].checked ? { default: true } : { check: inputs[0].value };
          cond.target = inputs[1].value;
          node.conditions.push(cond);
        });
      }
      if (['ActionNode', 'EventNode', 'SceneSwitchNode', 'WaitNode'].includes(type)) {
        if (type === 'ActionNode') node.action = document.getElementById('node-action').value;
        if (type === 'EventNode') node.event = document.getElementById('node-event').value;
        node.target = document.getElementById('node-target').value;
      }
      if (type === 'WaitNode') {
        node.wait = parseFloat(document.getElementById('node-wait').value) || 1;
      }

      state.sceneGraph[id] = node;
      alert(`Вузол ${id} збережено!`);
      saveToStorage();
    }

    document.getElementById('load-scene').addEventListener('click', () => {
      const id = prompt('Введіть ID початкового вузла:');
      if (id && state.sceneGraph[id]) {
        state.currentScene = id;
        alert('Сцена завантажена!');
      }
    });

    document.getElementById('play-scene').addEventListener('click', () => {
      if (state.currentScene) {
        state.isPlayingScene = true;
        backBtn.classList.remove('hidden');
        openTab('play-tab');
        startTextScene(state.currentScene);
      } else {
        alert('Спочатку завантажте сцену!');
      }
    });

    // Text Player
    function renderTextPlayer() {
      if (!state.isPlayingScene) {
        textDisplay.innerHTML = '<p>Оберіть сцену для гри в редакторі.</p>';
        textChoices.innerHTML = '';
      }
    }

    function startTextScene(startId) {
      state.dialogStack = [];
      traverseNode(startId);
    }

    function exitTextScene() {
      state.isPlayingScene = false;
      backBtn.classList.add('hidden');
      openTab('create-tab');
    }

    function traverseNode(id) {
      const node = state.sceneGraph[id];
      if (!node) return;

      state.dialogStack.push(id);
      textChoices.innerHTML = '';

      if (node.type === 'TextNode') {
        textDisplay.innerHTML = `<p>${interpolate(node.text)}</p>`;
        if (node.next) {
          setTimeout(() => traverseNode(node.next), 1000);
        }
      } else if (node.type === 'ChoiceNode') {
        textDisplay.innerHTML = `<p>${interpolate(node.text)}</p>`;
        node.choices.forEach(choice => {
          if (choice.condition && !evalCondition(choice.condition)) return;
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = interpolate(choice.label);
          btn.onclick = () => {
            if (choice.action) executeAction(choice.action);
            traverseNode(choice.target);
          };
          textChoices.appendChild(btn);
        });
      } else if (node.type === 'ConditionNode') {
        let target = null;
        for (const cond of node.conditions) {
          if (cond.default) {
            target = cond.target;
          } else if (evalCondition(cond.check)) {
            target = cond.target;
            break;
          }
        }
        if (target) traverseNode(target);
      } else if (node.type === 'ActionNode') {
        executeAction(node.action);
        traverseNode(node.target);
      } else if (node.type === 'EventNode') {
        triggerEvent(node.event);
        traverseNode(node.target);
      } else if (node.type === 'SceneSwitchNode') {
        // Switch mode or scene
        traverseNode(node.target);
      } else if (node.type === 'WaitNode') {
        textDisplay.innerHTML = '<p>...</p>';
        setTimeout(() => traverseNode(node.target), node.wait * 1000);
      } else if (node.type === 'ImageNode') {
        textDisplay.innerHTML = `<p>${interpolate(node.text)}</p><img src="${node.image}" style="max-width:100%; height:auto;" />`;
        if (node.next) {
          setTimeout(() => traverseNode(node.next), 1000);
        }
      } else if (node.type === 'AudioNode') {
        const audio = new Audio(node.audio);
        audio.play().catch(() => {});
        textDisplay.innerHTML = `<p>${interpolate(node.text)}</p>`;
        if (node.next) {
          audio.onended = () => traverseNode(node.next);
        }
      }
    }

    function interpolate(str) {
      return str.replace(/{(\w+)}/g, (match, key) => {
        return state.variables[key] !== undefined ? state.variables[key] : match;
      });
    }

    function evalCondition(cond) {
      try {
        return eval(interpolate(cond));
      } catch (e) {
        return false;
      }
    }

    function executeAction(action) {
      try {
        const match = action.match(/(\w+)\s*([+\-*\/]?=)\s*(\S+)/);
        if (match) {
          const varName = match[1];
          const op = match[2];
          let val = match[3];
          if (val === 'true') val = true;
          else if (val === 'false') val = false;
          else if (!isNaN(val)) val = parseFloat(val);
          else val = interpolate(`{${val}}`);

          if (op === '=') state.variables[varName] = val;
          else if (op === '+=') state.variables[varName] += val;
          else if (op === '-=') state.variables[varName] -= val;
          else if (op === '*=') state.variables[varName] *= val;
          else if (op === '/=') state.variables[varName] /= val;
        }
      } catch (e) {
        console.error('Action error:', e);
      }
      saveToStorage();
    }

    function triggerEvent(event) {
      console.log('Event triggered:', event);
    }

      });
    }

    function setupComponentType(container) {

      const propsDiv = container.querySelector('.comp-props');
      select.onchange = () => {
        const type = select.value;
        propsDiv.innerHTML = '';

        } else if (type === 'MeshComponent') {

    }

    document.getElementById('save-entity').addEventListener('click', saveEntity);
    function saveEntity() {

    // Chat
    document.getElementById('send-chat').addEventListener('click', () => {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (msg) {
        state.chatHistory.push(`${state.profile.username}: ${msg}`);
        renderChat();
        input.value = '';
        saveToStorage();
      }
    });

    function renderChat() {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '';
      state.chatHistory.slice(-50).forEach(msg => {
        const div = document.createElement('div');
        div.textContent = msg;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    // Mining
    const miningCanvas = document.getElementById('mining-canvas');
    let miningInterval;
    document.getElementById('start-mining').addEventListener('click', () => {
      if (!state.mining.active) {
        state.mining.active = true;
        miningInterval = setInterval(() => {
          state.mining.progress += state.mining.level;
          if (state.mining.progress >= 100) {
            state.mining.progress = 0;
            state.profile.xp += 10 * state.mining.level;
            checkLevelUp();
            saveToStorage();
          }
          drawMining();
        }, 100);
      }
    });

    document.getElementById('stop-mining').addEventListener('click', () => {
      clearInterval(miningInterval);
      state.mining.active = false;
    });

    document.getElementById('upgrade-miner').addEventListener('click', () => {

      if (state.variables.gold >= cost) {

    function drawMining() {

      ctx.fillRect(0, 0, miningCanvas.width, miningCanvas.height);
      const w = (miningCanvas.width - 40) * (state.mining.progress / 100);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(20, miningCanvas.height / 2 - 10, w, 20);
      ctx.strokeStyle = '#0f0';
      ctx.strokeRect(20, miningCanvas.height / 2 - 10, miningCanvas.width - 40, 20);
      ctx.fillStyle = '#0f0';
      ctx.font = '14px monospace';
      ctx.fillText(`Майнінг... Рівень: ${state.mining.level}`, 20, miningCanvas.height / 2 - 20);
    }

    function checkLevelUp() {
      if (state.profile.xp >= state.profile.level * 100) {
        state.profile.level++;

        alert(`Рівень підвищено! Ви тепер ${state.profile.level} рівня!`);

        saveToStorage();
      }
    });

    // Storage
    function saveToStorage() {
      try {
        localStorage.setItem('evo-engine-state', JSON.stringify(state));
      } catch (e) {
        console.error('Save failed', e);
      }
    }

    function loadFromStorage() {
      const saved = localStorage.getItem('evo-engine-state');
      if (saved) {

          const loaded = JSON.parse(saved);
          Object.assign(state, loaded);
          document.getElementById('username').textContent = state.profile.username;
          document.getElementById('level').textContent = state.profile.level;
          document.getElementById('xp').textContent = state.profile.xp;

        }

    }

    // Init
    window.addEventListener('resize', () => {
      if (state.currentTab === 'create-tab') {
        initSceneCanvas();
      }
    });

    window.addEventListener('load', () => {
      loadFromStorage();
      initSceneCanvas();
      renderChat();
      drawMining();
    });
  
// === TILE EDITOR ===
function initTileEditor() {
    const tileGridSize = 16;
    const tileTypes = ['Empty', 'Solid', 'Trigger', 'Collectible', 'Spawner', 'Door', 'Hazard'];
    const tileSize = 32; // px

    const state = window.state;
    if (!state.editor) state.editor = {};
    if (!state.editor.tiles) {
        state.editor.tiles = Array(tileGridSize).fill().map(() => Array(tileGridSize).fill({ type: 'Empty', props: {} }));
    }

    const container = document.getElementById('scene-canvas');
    const tileEditor = document.createElement('div');
    tileEditor.id = 'tile-editor';
    tileEditor.style.cssText = `
        display: grid;
        grid-template-columns: repeat(${tileGridSize}, ${tileSize}px);
        gap: 1px;
        background: #111;
        border: 1px solid #333;
        margin: 10px;
    `;
    container.innerHTML = '';
    container.appendChild(tileEditor);

    const propsPanel = document.getElementById('entity-props') || createPropsPanel();
    function createPropsPanel() {
        const panel = document.createElement('div');
        panel.id = 'entity-props';
        panel.style.cssText = 'position: absolute; top: 10px; right: 10px; width: 200px; background: #1e1e1e; color: white; padding: 10px; border: 1px solid #444;';
        document.body.appendChild(panel);
        return panel;
    }

    function renderTileEditor() {
        tileEditor.innerHTML = '';
        state.editor.tiles.forEach((row, y) => {
            row.forEach((tile, x) => {
                const tileEl = document.createElement('div');
                tileEl.dataset.x = x;
                tileEl.dataset.y = y;
                tileEl.style.cssText = `
                    width: ${tileSize}px;
                    height: ${tileSize}px;
                    background: ${getTileColor(tile.type)};
                    border: 1px solid #333;
                    box-sizing: border-box;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 10px;
                    color: rgba(255,255,255,0.6);
                `;
                tileEl.textContent = tile.type.charAt(0);
                tileEl.addEventListener('click', (e) => {
                    const x = parseInt(tileEl.dataset.x);
                    const y = parseInt(tileEl.dataset.y);
                    if (e.shiftKey) {
                        state.editor.tiles[y][x] = { type: 'Empty', props: {} };
                    } else {
                        state.editor.tiles[y][x] = { type: 'Solid', props: {} };
                    }
                    renderTileEditor();
                    showTileProps(x, y);
                });
                tileEl.addEventListener('dblclick', () => {
                    const x = parseInt(tileEl.dataset.x);
                    const y = parseInt(tileEl.dataset.y);
                    showTileProps(x, y);
                });
                tileEditor.appendChild(tileEl);
            });
        });
    }

    function getTileColor(type) {
        const colors = {
            Empty: '#1a1a1a',
            Solid: '#8B4513',
            Trigger: '#FFD700',
            Collectible: '#32CD32',
            Spawner: '#8A2BE2',
            Door: '#4682B4',
            Hazard: '#FF4500'
        };
        return colors[type] || '#1a1a1a';
    }

    function showTileProps(x, y) {
        const tile = state.editor.tiles[y][x];
        propsPanel.innerHTML = `
            <h4>Tile Properties</h4>
            <label>Type: 
                <select id="tile-type-select">
                    ${tileTypes.map(t => `<option value="${t}" ${t === tile.type ? 'selected' : ''}>${t}</option>`).join('')}
                </select>
            </label>
            <div id="tile-specific-props"></div>
            <button onclick="window.saveTileProps(${x}, ${y})">Save</button>
        `;

        const select = propsPanel.querySelector('#tile-type-select');
        select.addEventListener('change', () => {
            const extraProps = document.getElementById('tile-specific-props');
            extraProps.innerHTML = '';
            const type = select.value;
            if (type === 'Collectible') {
                extraProps.innerHTML = `<input type="text" id="collectible-id" placeholder="Item ID" value="${tile.props.itemId || ''}">`;
            } else if (type === 'Trigger') {
                extraProps.innerHTML = `<input type="text" id="trigger-event" placeholder="Event" value="${tile.props.event || ''}">`;
            } else if (type === 'Door') {
                extraProps.innerHTML = `<input type="text" id="door-id" placeholder="Door ID" value="${tile.props.doorId || ''}">`;
            }
        });
        select.dispatchEvent(new Event('change'));
    }

    window.saveTileProps = function(x, y) {
        const select = propsPanel.querySelector('#tile-type-select');
        const type = select.value;
        const tile = state.editor.tiles[y][x];
        tile.type = type;
        if (type === 'Collectible') {
            tile.props.itemId = document.getElementById('collectible-id').value;
        } else if (type === 'Trigger') {
            tile.props.event = document.getElementById('trigger-event').value;
        } else if (type === 'Door') {
            tile.props.doorId = document.getElementById('door-id').value;
        }
        renderTileEditor();
    };

    window.saveTileMap = function() {
        localStorage.setItem('evo-tilemap', JSON.stringify(state.editor.tiles));
        alert('Map saved!');
    };

    window.loadTileMap = function() {
        const saved = localStorage.getItem('evo-tilemap');
        if (saved) {
            state.editor.tiles = JSON.parse(saved);
            renderTileEditor();
        }
    };

    renderTileEditor();
}

// === VOXEL EDITOR ===
function initVoxelEditor() {
    const voxelGridSize = 8;
    const voxelTypes = ['Solid', 'Transparent', 'Liquid', 'Light', 'Destructible'];
    const state = window.state;
    if (!state.editor.voxels) {
        state.editor.voxels = Array(voxelGridSize).fill().map(() =>
            Array(voxelGridSize).fill().map(() =>
                Array(voxelGridSize).fill({ type: 'Empty', color: '#ffffff' })
            )
        );
    }

    const container = document.getElementById('scene-canvas');
    container.innerHTML = `
        <div id="voxel-container" style="position: relative; width: 500px; height: 500px; margin: 10px auto; perspective: 1000px;">
            <div id="voxel-scene" style="position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.1s;">
            </div>
        </div>
        <input type="range" id="z-layer-slider" min="0" max="${voxelGridSize-1}" value="0" style="width: 80%; margin: 10px;">
        <div id="color-palette" style="display: flex; gap: 5px; margin: 10px; flex-wrap: wrap;">
            ${['#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff','#888888'].map(c =>
                `<div class="color-swatch" data-color="${c}" style="width: 20px; height: 20px; background: ${c}; border: 1px solid #333; cursor: pointer;"></div>`
            ).join('')}
        </div>
    `;

    const scene = document.getElementById('voxel-scene');
    const slider = document.getElementById('z-layer-slider');
    const swatches = document.querySelectorAll('.color-swatch');
    let selectedColor = '#ffffff';
    let camera = { rotX: 30, rotY: 45, distance: 200 };

    swatches.forEach(swatch => {
        swatch.addEventListener('click', () => {
            selectedColor = swatch.dataset.color;
            document.querySelectorAll('.color-swatch').forEach(s => s.style.border = '1px solid #333');
            swatch.style.border = '2px solid white';
        });
    });

    function renderVoxelLayer(z) {
        scene.innerHTML = '';
        scene.style.transform = `rotateX(${-camera.rotX}deg) rotateY(${-camera.rotY}deg) translateZ(${-camera.distance}px)`;

        for (let x = 0; x < voxelGridSize; x++) {
            for (let y = 0; y < voxelGridSize; y++) {
                const voxel = state.editor.voxels[z][y][x];
                if (voxel.type === 'Empty') continue;

                const voxelEl = document.createElement('div');
                voxelEl.style.cssText = `
                    position: absolute;
                    width: 40px; height: 40px;
                    transform-style: preserve-3d;
                    transform: translate3d(${x * 42}px, ${y * 42}px, ${z * 42}px);
                `;

                // 6 faces
                const faces = [
                    { rot: `rotateY(0deg) translateZ(20px)`, vis: 'visible' },
                    { rot: `rotateY(180deg) translateZ(20px)`, vis: voxelGridSize - 1 - x > 0 ? state.editor.voxels[z][y][x + 1]?.type === 'Empty' : true },
                    { rot: `rotateY(90deg) translateZ(20px)`, vis: y > 0 ? state.editor.voxels[z][y - 1][x]?.type === 'Empty' : true },
                    { rot: `rotateY(-90deg) translateZ(20px)`, vis: y < voxelGridSize - 1 ? state.editor.voxels[z][y + 1][x]?.type === 'Empty' : true },
                    { rot: `rotateX(90deg) translateZ(20px)`, vis: z > 0 ? state.editor.voxels[z - 1][y][x]?.type === 'Empty' : true },
                    { rot: `rotateX(-90deg) translateZ(20px)`, vis: z < voxelGridSize - 1 ? state.editor.voxels[z + 1][y][x]?.type === 'Empty' : true }
                ];

                faces.forEach((face, i) => {
                    if (!face.vis) return;
                    const faceEl = document.createElement('div');
                    faceEl.style.cssText = `
                        position: absolute;
                        width: 40px; height: 40px;
                        background: ${voxel.color};
                        border: 1px solid rgba(0,0,0,0.2);
                        box-sizing: border-box;
                        transform: ${face.rot};
                        opacity: ${voxel.type === 'Transparent' ? 0.5 : 1};
                        ${voxel.type === 'Liquid' ? 'animation: move 2s infinite alternate;' : ''}
                    `;
                    voxelEl.appendChild(faceEl);
                });

                voxelEl.addEventListener('click', () => {
                    state.editor.voxels[z][y][x] = {
                        type: state.editor.voxels[z][y][x].type === 'Solid' ? 'Empty' : 'Solid',
                        color: selectedColor
                    };
                    renderVoxelLayer(parseInt(slider.value));
                });

                scene.appendChild(voxelEl);
            }
        }
    }

    slider.addEventListener('input', () => renderVoxelLayer(parseInt(slider.value)));

    // Camera controls
    let isDragging = false;
    let lastMouse = { x: 0, y: 0 };
    container.addEventListener('mousedown', (e) => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; });
    container.addEventListener('mousemove', (e) => {
        if (isDragging) {
            camera.rotY += (e.clientX - lastMouse.x) * 0.5;
            camera.rotX += (e.clientY - lastMouse.y) * 0.5;
            camera.rotX = Math.max(-90, Math.min(90, camera.rotX));
            lastMouse = { x: e.clientX, y: e.clientY };
            renderVoxelLayer(parseInt(slider.value));
        }
    });
    container.addEventListener('mouseup', () => isDragging = false);
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        camera.distance += e.deltaY * 0.5;
        camera.distance = Math.max(100, Math.min(500, camera.distance));
        renderVoxelLayer(parseInt(slider.value));
    });

    renderVoxelLayer(0);

    window.saveVoxelMap = () => {
        localStorage.setItem('evo-voxelmap', JSON.stringify(state.editor.voxels));
        alert('Voxel map saved!');
    };

    window.loadVoxelMap = () => {
        const saved = localStorage.getItem('evo-voxelmap');
        if (saved) {
            state.editor.voxels = JSON.parse(saved);
            renderVoxelLayer(parseInt(slider.value));
        }
    };
}

// === QUEST VALIDATOR ===
function initQuestValidator() {
    const state = window.state;
    if (!state.scenes) state.scenes = [];

    const container = document.getElementById('scene-canvas');
    container.innerHTML = '<canvas id="quest-graph" width="800" height="600"></canvas>';
    const canvas = document.getElementById('quest-graph');
    const ctx = canvas.getContext('2d');

    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const nodes = state.scenes.map((scene, i) => ({
            id: scene.id,
            x: 100 + (i % 5) * 150,
            y: 100 + Math.floor(i / 5) * 150
        }));

        // Draw edges
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 2;
        state.scenes.forEach(scene => {
            if (scene.links) {
                scene.links.forEach(link => {
                    const from = nodes.find(n => n.id === scene.id);
                    const to = nodes.find(n => n.id === link.target);
                    if (from && to) {
                        ctx.beginPath();
                        ctx.moveTo(from.x, from.y);
                        ctx.lineTo(to.x, to.y);
                        ctx.stroke();
                    }
                });
            }
        });

        // Validate reachability
        const reachable = new Set();
        const queue = ['start'];
        while (queue.length) {
            const id = queue.shift();
            if (reachable.has(id)) continue;
            reachable.add(id);
            const scene = state.scenes.find(s => s.id === id);
            if (scene?.links) {
                scene.links.forEach(link => queue.push(link.target));
            }
        }

        // Draw nodes
        nodes.forEach(node => {
            const scene = state.scenes.find(s => s.id === node.id);
            const isReachable = reachable.has(node.id);
            const hasLinks = scene?.links?.length > 0;

            ctx.fillStyle = !isReachable ? '#ff4444' : !hasLinks ? '#ffcc00' : '#44cc44';
            ctx.beginPath();
            ctx.arc(node.x, node.y, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.id, node.x, node.y);
        });
    }

    drawGraph();
    window.validateQuest = drawGraph; // For manual revalidate
}

// === GAME RUNNER ===
function initGameRunner() {
    const state = window.state;
    const container = document.getElementById('scene-canvas');
    container.innerHTML = '<div id="game-runner"></div>';
    const runner = document.getElementById('game-runner');

    let currentPlayerPos = { x: 0, y: 0 };
    let currentZ = 0; // for 3D layer
    let currentSceneId = 'start';

    function runGame() {
        const mode = state.currentMode || 'text';
        runner.innerHTML = '';

        if (mode === 'text') {
            const scene = state.scenes?.find(s => s.id === currentSceneId);
            if (scene) {
                runner.innerHTML = `<div class="text-mode">
                    <h3>${scene.title || 'Scene'}</h3>
                    <p>${scene.text || 'No text.'}</p>
                </div>`;
                if (scene.links && scene.links.length > 0) {
                    scene.links.forEach(link => {
                        const btn = document.createElement('button');
                        btn.textContent = link.label || 'Continue';
                        btn.onclick = () => {
                            currentSceneId = link.target;
                            runGame();
                        };
                        runner.appendChild(btn);
                    });
                } else {
                    runner.innerHTML += '<p><i>This is an ending.</i></p>';
                }
            } else {
                runner.innerHTML = '<p>Scene not found!</p>';
            }
        }

        else if (mode === '2d') {
            const tileGridSize = 16;
            const tileSize = 32;
            const mapEl = document.createElement('div');
            mapEl.style.cssText = `display: grid; grid-template-columns: repeat(${tileGridSize}, ${tileSize}px); gap: 1px; background: #111; margin: 10px;`;

            state.editor.tiles?.forEach((row, y) => {
                row.forEach((tile, x) => {
                    const tileEl = document.createElement('div');
                    tileEl.style.cssText = `
                        width: ${tileSize}px; height: ${tileSize}px;
                        background: ${getTileColor(tile.type)};
                        border: 1px solid #333;
                        box-sizing: border-box;
                        position: relative;
                    `;
                    if (x === currentPlayerPos.x && y === currentPlayerPos.y) {
                        tileEl.innerHTML = '<div style="width:20px;height:20px;background:cyan; border-radius:50%; margin:6px;"></div>';
                    }
                    mapEl.appendChild(tileEl);
                });
            });

            runner.appendChild(mapEl);

            // Controls
            const controls = document.createElement('div');
            controls.innerHTML = `
                <button onclick="window.movePlayer('up')">↑</button><br>
                <button onclick="window.movePlayer('left')">←</button>
                <button onclick="window.movePlayer('down')">↓</button>
                <button onclick="window.movePlayer('right')">→</button>
            `;
            runner.appendChild(controls);
        }

        else if (mode === '3d') {
            const voxelGridSize = 8;
            const sceneEl = document.createElement('div');
            sceneEl.style.cssText = `position: relative; width: 400px; height: 400px; margin: 10px auto; perspective: 800px;`;
            const inner = document.createElement('div');
            inner.style.cssText = 'position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateX(30deg) rotateY(45deg);';

            for (let z = 0; z < voxelGridSize; z++) {
                for (let y = 0; y < voxelGridSize; y++) {
                    for (let x = 0; x < voxelGridSize; x++) {
                        const voxel = state.editor.voxels?.[z]?.[y]?.[x];
                        if (voxel?.type !== 'Empty') {
                            const voxelEl = document.createElement('div');
                            voxelEl.style.cssText = `
                                position: absolute;
                                width: 40px; height: 40px;
                                transform-style: preserve-3d;
                                transform: translate3d(${x * 42}px, ${y * 42}px, ${z * 42}px);
                            `;
                            // Render faces with culling
                            const faces = [
                                { rot: `rotateY(0deg) translateZ(20px)` },
                                { rot: `rotateY(180deg) translateZ(20px)` },
                                { rot: `rotateY(90deg) translateZ(20px)` },
                                { rot: `rotateY(-90deg) translateZ(20px)` },
                                { rot: `rotateX(90deg) translateZ(20px)` },
                                { rot: `rotateX(-90deg) translateZ(20px)` }
                            ];
                            faces.forEach(face => {
                                const faceEl = document.createElement('div');
                                faceEl.style.cssText = `
                                    position: absolute;
                                    width: 40px; height: 40px;
                                    background: ${voxel.color};
                                    border: 1px solid #000;
                                    transform: ${face.rot};
                                    opacity: ${voxel.type === 'Transparent' ? 0.5 : 1};
                                `;
                                voxelEl.appendChild(faceEl);
                            });
                            inner.appendChild(voxelEl);
                        }
                    }
                }
            }

            // Player indicator
            const playerEl = document.createElement('div');
            playerEl.style.cssText = `
                position: absolute;
                width: 40px; height: 40px;
                transform: translate3d(${currentPlayerPos.x * 42}px, ${currentPlayerPos.y * 42}px, ${currentZ * 42 + 60}px);
            `;
            playerEl.innerHTML = '<div style="width:100%;height:100%;background:orange; border-radius:50%;"></div>';
            inner.appendChild(playerEl);

            sceneEl.appendChild(inner);
            runner.appendChild(sceneEl);
        }
    }

    window.movePlayer = function(dir) {
        const max = 15;
        switch (dir) {
            case 'up': if (currentPlayerPos.y > 0) currentPlayerPos.y--; break;
            case 'down': if (currentPlayerPos.y < max) currentPlayerPos.y++; break;
            case 'left': if (currentPlayerPos.x > 0) currentPlayerPos.x--; break;
            case 'right': if (currentPlayerPos.x < max) currentPlayerPos.x++; break;
        }
        runGame();
    };

    runGame();
    window.runGame = runGame; // For external refresh
}

function getTileColor(type) {
    const colors = {
        Empty: '#1a1a1a',
        Solid: '#8B4513',
        Trigger: '#FFD700',
        Collectible: '#32CD32',
        Spawner: '#8A2BE2',
        Door: '#4682B4',
        Hazard: '#FF4500'
    };
    return colors[type] || '#1a1a1a';
}

</script>
</body>
</html>
