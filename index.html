
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evo-Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', monospace;
    }
    body {
      background: #111;
      color: #0f0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #222;
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #0f0;
      font-size: 1.5em;
    }
    main {
      flex: 1;
      display: flex;
      position: relative;
    }
    #game-container, #editor-container, #miner-container, #chat-container, #profile-container {
      display: none;
      width: 100%;
      height: 100%;
      padding: 10px;
      overflow: auto;
    }
    .active {
      display: block;
    }
    nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #222;
      display: flex;
      border-top: 1px solid #0f0;
    }
    nav button {
      flex: 1;
      padding: 12px;
      background: #333;
      color: #0f0;
      border: none;
      font-size: 1.2em;
      cursor: pointer;
    }
    nav button:hover {
      background: #444;
    }
    nav button.active {
      background: #0f0;
      color: #111;
    }

    /* Quest Editor */
    .quest-editor {
      display: flex;
      gap: 10px;
      height: 100%;
    }
    .quest-sidebar {
      width: 300px;
      background: #222;
      padding: 10px;
      border: 1px solid #0f0;
      overflow-y: auto;
    }
    .quest-canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .canvas-pair {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    canvas {
      border: 1px solid #0f0;
      image-rendering: pixelated;
    }
    .pixel-grid {
      position: relative;
      cursor: crosshair;
    }
    .pixel {
      width: 8px;
      height: 8px;
      border: 1px solid rgba(0,255,0,0.1);
      display: inline-block;
    }
    textarea, input, select {
      width: 100%;
      background: #333;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 5px;
      margin: 5px 0;
    }
    button.btn {
      background: #0f0;
      color: #111;
      border: none;
      padding: 5px 10px;
      margin: 5px 0;
      cursor: pointer;
    }
    button.btn:hover {
      background: #0f0a;
    }
    .list-item {
      padding: 8px;
      margin: 5px 0;
      background: #333;
      border: 1px solid #0f0;
    }
    .condition, .effect {
      display: flex;
      gap: 5px;
      margin: 3px 0;
    }
    .condition input, .effect select, .effect input {
      flex: 1;
    }

    /* 2D Arcade & Platformer */
    #arcade-grid {
      display: grid;
      grid-template-columns: repeat(16, 20px);
      grid-template-rows: repeat(16, 20px);
      gap: 0;
      margin: 10px auto;
      border: 1px solid #0f0;
    }
    .grid-cell {
      width: 20px;
      height: 20px;
      background: #222;
      border: 1px solid #333;
      cursor: pointer;
    }
    .grid-cell.wall { background: #555; }
    .grid-cell.collectible { background: #ff0; }
    .grid-cell.triggers { background: #f0f; }
    .grid-cell.door { background: #844; }
    .grid-cell.key { background: #ff8; }
    .grid-cell.enemy { background: #f00; }
    .grid-cell.npc { background: #08f; }
    .grid-cell.player { background: #0f0; }

    .palette {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .palette-item {
      padding: 8px 12px;
      background: #333;
      border: 1px solid #555;
      cursor: pointer;
    }
    .palette-item.selected {
      border-color: #0f0;
      background: #0f0;
      color: #111;
    }

    /* 3D Voxel */
    #voxel-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
    }
    #voxel-layer-slider {
      margin: 10px 0;
      width: 80%;
    }
    #voxel-grid-3d {
      display: grid;
      grid-template-columns: repeat(8, 20px);
      grid-template-rows: repeat(8, 20px);
      gap: 0;
      margin: 10px;
    }
    .voxel-cell {
      width: 20px;
      height: 20px;
      background: #222;
      border: 1px solid #333;
      cursor: pointer;
    }
    .voxel-cell.solid { background: #888; }
    .voxel-cell.transparent { background: #88f; opacity: 0.6; }
    .voxel-cell.active { background: #f88; }

    #voxel-canvas {
      width: 320px;
      height: 320px;
      border: 1px solid #0f0;
      margin: 10px;
    }

    /* Miner */
    .miner-game {
      text-align: center;
      padding: 20px;
    }
    .resource {
      font-size: 1.5em;
      margin: 10px;
    }
    .miner-btn {
      font-size: 2em;
      padding: 20px;
      background: #0f0;
      color: #111;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      margin: 10px;
    }

    /* Chat */
    #chat-box {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #0f0;
      padding: 10px;
      margin: 10px 0;
    }
    .chat-message {
      margin: 5px 0;
      padding: 5px;
      background: #333;
    }

    /* Profile */
    .profile-form {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #222;
      border: 1px solid #0f0;
    }
  </style>
</head>
<body>
  <header>Evo-Engine</header>
  <main>
    <!-- Режим 1: Текстовий квест -->
    <div id="game-container" class="active">
      <div id="quest-game-view">
        <h2 id="scene-title">Початок</h2>
        <div id="scene-image-container">
          <canvas id="scene-bg-canvas" width="64" height="64"></canvas>
          <canvas id="scene-char-canvas" width="64" height="64"></canvas>
        </div>
        <p id="scene-text">Ласкаво просимо до квесту!</p>
        <div id="scene-buttons"></div>
      </div>
    </div>

    <!-- Режим 2/3: Редактор -->
    <div id="editor-container">
      <div class="quest-editor">
        <div class="quest-sidebar">
          <h3>Редактор сцени</h3>
          <label>Назва сцени</label>
          <input type="text" id="scene-name" value="Сцена 1"/>

          <label>Текст сцени</label>
          <textarea id="scene-text-input" rows="4">Ви в темній кімнаті.</textarea>

          <h4>Фон (64x64)</h4>
          <div class="pixel-grid" id="bg-pixel-grid"></div>

          <h4>Персонаж (64x64)</h4>
          <div class="pixel-grid" id="char-pixel-grid"></div>

          <h4>Кнопки</h4>
          <div id="button-list"></div>
          <button class="btn" id="add-button">+ Додати кнопку</button>

          <h4>Змінні</h4>
          <div id="variable-list"></div>
          <button class="btn" id="add-variable">+ Додати змінну</button>

          <button class="btn" id="save-scene">Зберегти сцену</button>
          <button class="btn" id="validate-quest">Перевірити квест</button>
        </div>

        <div class="quest-canvas-area">
          <canvas id="bg-canvas" width="64" height="64"></canvas>
          <canvas id="char-canvas" width="64" height="64"></canvas>

          <!-- 2D Arcade Grid -->
          <div id="arcade-tools" style="display:none">
            <div class="palette">
              <div class="palette-item" data-type="empty">Пусто</div>
              <div class="palette-item" data-type="wall">Стіна</div>
              <div class="palette-item" data-type="collectible">Збірний</div>
              <div class="palette-item" data-type="triggers">Тригер</div>
              <div class="palette-item" data-type="door">Двері</div>
              <div class="palette-item" data-type="key">Ключ</div>
              <div class="palette-item" data-type="enemy">Ворог</div>
              <div class="palette-item" data-type="npc">NPC</div>
              <div class="palette-item" data-type="player">Гравець</div>
            </div>
            <div id="arcade-grid"></div>
          </div>

          <!-- Platformer Physics Toggle -->
          <div id="platformer-tools" style="display:none">
            <h4>Фізика</h4>
            <label>Сила стрибка <input type="number" id="jump-force" value="12" /></label>
            <label>Швидкість <input type="number" id="player-speed" value="3" /></label>
            <label>Гравітація <input type="number" id="gravity" value="0.6" /></label>
          </div>

          <!-- 3D Voxel -->
          <div id="voxel-tools" style="display:none">
            <h4>Шар: <span id="layer-label">4</span></h4>
            <input type="range" id="voxel-layer-slider" min="0" max="7" value="4" />
            <div class="palette">
              <div class="palette-item" data-voxel="air">Повітря</div>
              <div class="palette-item" data-voxel="solid">Твердий</div>
              <div class="palette-item" data-voxel="transparent">Прозорий</div>
              <div class="palette-item" data-voxel="active">Активний</div>
            </div>
            <div id="voxel-grid-3d"></div>
            <canvas id="voxel-canvas" width="320" height="320"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Режим 3: Майнери -->
    <div id="miner-container">
      <div class="miner-game">
        <h2>Майнери</h2>
        <div class="resource">Крипта: <span id="crypto">0</span></div>
        <button class="miner-btn" id="mine-btn">⛏</button>
        <div class="resource">Авто-майнінг: <span id="auto-miners">0</span> (1/sec)</div>
        <button class="btn" id="buy-miner">Купити майнер (10)</button>
      </div>
    </div>

    <!-- Режим 4: Чат -->
    <div id="chat-container">
      <h2>Чат</h2>
      <div id="chat-box"></div>
      <input type="text" id="chat-input" placeholder="Введіть повідомлення..." />
      <button class="btn" id="send-chat">Надіслати</button>
    </div>

    <!-- Профіль -->
    <div id="profile-container">
      <div class="profile-form">
        <h2>Профіль</h2>
        <label>Ім'я <input type="text" id="profile-name" /></label>
        <label>Email <input type="email" id="profile-email" /></label>
        <label>GitHub <input type="text" id="profile-github" placeholder="username" /></label>
        <button class="btn" id="save-profile">Зберегти</button>
        <button class="btn" id="sync-github">Синхронізувати з GitHub</button>
      </div>
    </div>
  </main>

  <nav>
    <button data-mode="game" class="active">🎮 Гра</button>
    <button data-mode="editor">🔧 Редактор</button>
    <button data-mode="miner">⛏ Майнери</button>
    <button data-mode="chat">💬 Чат</button>
    <button data-mode="profile">👤 Профіль</button>
  </nav>

  <script>
    // Глобальні дані
    let currentMode = 'game';
    let scenes = JSON.parse(localStorage.getItem('evo-scenes')) || {
      'start': {
        id: 'start',
        title: 'Початок',
        text: 'Ласкаво просимо! Натисни далі.',
        bgPixels: Array(64*64).fill('#000000'),
        charPixels: Array(64*64).fill('#000000'),
        buttons: [{ label: 'Далі', target: 'scene2' }],
        variables: {}
      },
      'scene2': {
        id: 'scene2',
        title: 'Сцена 2',
        text: 'Тут нічого немає.',
        bgPixels: Array(64*64).fill('#333333'),
        charPixels: Array(64*64).fill('#000000'),
        buttons: [{ label: 'Назад', target: 'start' }],
        variables: {}
      }
    };
    let currentSceneId = 'start';
    let gameVariables = {};
    let selectedCellType = 'wall';
    let selectedVoxelType = 'solid';
    let currentLayer = 4;
    let voxelWorld = Array(8).fill().map(() => Array(8).fill().map(() => Array(8).fill('air')));
    let minerData = JSON.parse(localStorage.getItem('evo-miner')) || { crypto: 0, autoMiners: 0 };
    let chatMessages = JSON.parse(localStorage.getItem('evo-chat')) || [];
    let profileData = JSON.parse(localStorage.getItem('evo-profile')) || {};

    // Навігація
    document.querySelectorAll('nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.getAttribute('data-mode');
        setMode(mode);
      });
    });

    function setMode(mode) {
      document.getElementById(`${currentMode}-container`).classList.remove('active');
      document.getElementById(`${mode}-container`).classList.add('active');
      document.querySelector(`nav button[data-mode="${currentMode}"]`).classList.remove('active');
      document.querySelector(`nav button[data-mode="${mode}"]`).classList.add('active');
      currentMode = mode;

      if (mode === 'game') showScene(currentSceneId);
      if (mode === 'editor') loadSceneEditor();
      if (mode === 'miner') updateMinerDisplay();
      if (mode === 'chat') renderChat();
      if (mode === 'profile') loadProfile();
    }

    // === РЕЖИМ 1: Текстовий квест ===
    function showScene(id) {
      const scene = scenes[id];
      if (!scene) return;
      currentSceneId = id;
      document.getElementById('scene-title').textContent = scene.title;
      document.getElementById('scene-text').textContent = scene.text;
      drawCanvasFromPixels('bg-canvas', scene.bgPixels);
      drawCanvasFromPixels('char-canvas', scene.charPixels);

      const btnContainer = document.getElementById('scene-buttons');
      btnContainer.innerHTML = '';
      (scene.buttons || []).forEach(btn => {
        if (btn.condition && !evalCondition(btn.condition)) return;
        const b = document.createElement('button');
        b.textContent = btn.label;
        b.onclick = () => {
          applyEffects(btn.effects);
          showScene(btn.target);
        };
        btnContainer.appendChild(b);
      });
    }

    function evalCondition(cond) {
      if (!cond) return true;
      const parts = cond.split(' ');
      if (parts.length !== 3) return false;
      const [varName, op, value] = parts;
      const actual = gameVariables[varName];
      const val = value === 'true' ? true : value === 'false' ? false : isNaN(value) ? value : Number(value);
      switch (op) {
        case '==': return actual == val;
        case '!=': return actual != val;
        case '>': return actual > val;
        case '<': return actual < val;
        default: return false;
      }
    }

    function applyEffects(effects) {
      if (!effects) return;
      effects.forEach(eff => {
        if (eff.type === 'set') {
          gameVariables[eff.var] = isNaN(eff.value) ? eff.value : (eff.value === 'true' ? true : eff.value === 'false' ? false : Number(eff.value));
        }
        if (eff.type === 'add') {
          if (!gameVariables[eff.var]) gameVariables[eff.var] = 0;
          gameVariables[eff.var] += Number(eff.value);
        }
      });
    }

    // === Редактор сцени ===
    function loadSceneEditor() {
      const scene = scenes[currentSceneId];
      document.getElementById('scene-name').value = scene.title;
      document.getElementById('scene-text-input').value = scene.text;
      drawPixelGrid('bg-pixel-grid', scene.bgPixels, 'bg-canvas');
      drawPixelGrid('char-pixel-grid', scene.charPixels, 'char-canvas');
      renderButtonList();
      renderVariableList();
      setupArcadeGrid();
      setupVoxelGrid();
      renderVoxel3D();
    }

    function drawPixelGrid(containerId, pixels, canvasId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
          const idx = y * 8 + x;
          const div = document.createElement('div');
          div.className = 'pixel';
          div.style.backgroundColor = pixels[idx];
          div.dataset.x = x;
          div.dataset.y = y;
          div.onclick = () => {
            div.style.backgroundColor = '#0f0';
            updatePixelInCanvas(canvasId, x, y, '#0f0');
            updateScenePixels(containerId, pixels, canvasId);
          };
          container.appendChild(div);
        }
      }
    }

    function updatePixelInCanvas(canvasId, x, y, color) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(x * 8, y * 8, 8, 8);
    }

    function updateScenePixels(gridId, pixels, canvasId) {
      const grid = document.querySelector(`#${gridId} .pixel`);
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, 64, 64);
      for (let i = 0; i < pixels.length; i++) {
        const x = i % 8;
        const y = Math.floor(i / 8);
        const px = x * 8;
        const py = y * 8;
        const idx = (py * 64 + px) * 4;
        const r = imgData.data[idx];
        const g = imgData.data[idx+1];
        const b = imgData.data[idx+2];
        pixels[i] = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
      }
    }

    function drawCanvasFromPixels(canvasId, pixels) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(64, 64);
      for (let i = 0; i < pixels.length; i++) {
        const x = i % 8;
        const y = Math.floor(i / 8);
        const px = x * 8;
        const py = y * 8;
        for (let dy = 0; dy < 8; dy++) {
          for (let dx = 0; dx < 8; dx++) {
            const idx = ((py + dy) * 64 + (px + dx)) * 4;
            const color = pixels[i].slice(1);
            imgData.data[idx] = parseInt(color.slice(0,2), 16);
            imgData.data[idx+1] = parseInt(color.slice(2,4), 16);
            imgData.data[idx+2] = parseInt(color.slice(4,6), 16);
            imgData.data[idx+3] = 255;
          }
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }

    function renderButtonList() {
      const list = document.getElementById('button-list');
      list.innerHTML = '';
      const scene = scenes[currentSceneId];
      (scene.buttons || []).forEach((btn, i) => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
          <input type="text" value="${btn.label}" placeholder="Текст кнопки"/>
          <select class="target-scene">
            ${Object.keys(scenes).map(id => `<option value="${id}" ${id===btn.target?'selected':''}>${scenes[id].title}</option>`).join('')}
          </select>
          <div class="condition">
            <input type="text" placeholder="змінна" value="${btn.condition?.split(' ')[0] || ''}" size="8"/>
            <select>
              <option value="==" ${btn.condition?.includes('==')?'selected':''}>==</option>
              <option value="!=" ${btn.condition?.includes('!=')?'selected':''}>!=</option>
              <option value=">" ${btn.condition?.includes('>')?'selected':''}>></option>
              <option value="<" ${btn.condition?.includes('<')?'selected':''}><</option>
            </select>
            <input type="text" placeholder="значення" value="${btn.condition?.split(' ')[2] || ''}" size="8"/>
          </div>
          <h5>Ефекти</h5>
          <div class="effects-list"></div>
          <button class="btn add-effect">+ Ефект</button>
          <button class="btn remove-btn">Видалити</button>
        `;
        const effectsList = item.querySelector('.effects-list');
        (btn.effects || []).forEach(eff => {
          const effEl = document.createElement('div');
          effEl.className = 'effect';
          effEl.innerHTML = `
            <select><option value="set" ${eff.type==='set'?'selected':''}>Встановити</option><option value="add" ${eff.type==='add'?'selected':''}>Додати</option></select>
            <input type="text" placeholder="ім'я" value="${eff.var}" size="10"/>
            <input type="text" placeholder="значення" value="${eff.value}" size="10"/>
            <button class="btn rm-effect">x</button>
          `;
          effEl.querySelector('.rm-effect').onclick = () => effEl.remove();
          effectsList.appendChild(effEl);
        });
        item.querySelector('.add-effect').onclick = () => {
          const effEl = document.createElement('div');
          effEl.className = 'effect';
          effEl.innerHTML = `
            <select><option value="set">Встановити</option><option value="add">Додати</option></select>
            <input type="text" placeholder="ім'я" size="10"/>
            <input type="text" placeholder="значення" size="10"/>
            <button class="btn rm-effect">x</button>
          `;
          effEl.querySelector('.rm-effect').onclick = () => effEl.remove();
          effectsList.appendChild(effEl);
        };
        item.querySelector('.remove-btn').onclick = () => item.remove();
        list.appendChild(item);
      });
    }

    function renderVariableList() {
      const list = document.getElementById('variable-list');
      list.innerHTML = '';
      const scene = scenes[currentSceneId];
      Object.keys(scene.variables || {}).forEach(key => {
        const item = document.createElement('div');
        item.className = 'list-item';
        const val = scene.variables[key];
        item.innerHTML = `
          <input type="text" value="${key}" readonly/>
          <select class="var-type">
            <option value="number" ${typeof val === 'number' ? 'selected' : ''}>Число</option>
            <option value="boolean" ${typeof val === 'boolean' ? 'selected' : ''}>Логічне</option>
            <option value="string" ${typeof val === 'string' ? 'selected' : ''}>Текст</option>
          </select>
          <input type="text" value="${val}" class="var-value"/>
          <button class="btn rm-var">x</button>
        `;
        item.querySelector('.rm-var').onclick = () => item.remove();
        list.appendChild(item);
      });
    }

    document.getElementById('add-button').onclick = () => {
      const list = document.getElementById('button-list');
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <input type="text" placeholder="Текст кнопки"/>
        <select class="target-scene">
          ${Object.keys(scenes).map(id => `<option value="${id}">${scenes[id].title}</option>`).join('')}
        </select>
        <div class="condition">
          <input type="text" placeholder="змінна" size="8"/>
          <select>
            <option value="==">==</option>
            <option value="!=">!=</option>
            <option value=">">></option>
            <option value="<"><</option>
          </select>
          <input type="text" placeholder="значення" size="8"/>
        </div>
        <h5>Ефекти</h5>
        <div class="effects-list"></div>
        <button class="btn add-effect">+ Ефект</button>
        <button class="btn remove-btn">Видалити</button>
      `;
      const effectsList = item.querySelector('.effects-list');
      item.querySelector('.add-effect').onclick = () => {
        const effEl = document.createElement('div');
        effEl.className = 'effect';
        effEl.innerHTML = `
          <select><option value="set">Встановити</option><option value="add">Додати</option></select>
          <input type="text" placeholder="ім'я" size="10"/>
          <input type="text" placeholder="значення" size="10"/>
          <button class="btn rm-effect">x</button>
        `;
        effEl.querySelector('.rm-effect').onclick = () => effEl.remove();
        effectsList.appendChild(effEl);
      };
      item.querySelector('.remove-btn').onclick = () => item.remove();
      list.appendChild(item);
    };

    document.getElementById('add-variable').onclick = () => {
      const list = document.getElementById('variable-list');
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <input type="text" placeholder="ім'я"/>
        <select class="var-type">
          <option value="number">Число</option>
          <option value="boolean">Логічне</option>
          <option value="string">Текст</option>
        </select>
        <input type="text" placeholder="значення" class="var-value"/>
        <button class="btn rm-var">x</button>
      `;
      item.querySelector('.rm-var').onclick = () => item.remove();
      list.appendChild(item);
    };

    document.getElementById('save-scene').onclick = () => {
      const scene = scenes[currentSceneId];
      scene.title = document.getElementById('scene-name').value;
      scene.text = document.getElementById('scene-text-input').value;

      // Зберегти кнопки
      const buttonItems = document.querySelectorAll('#button-list .list-item');
      scene.buttons = [];
      buttonItems.forEach(item => {
        const inputs = item.querySelectorAll('input');
        const selects = item.querySelectorAll('select');
        const conditionParts = [
          inputs[1].value,
          selects[1].value,
          inputs[2].value
        ];
        const condition = conditionParts[0] && conditionParts[2] ? conditionParts.join(' ') : null;
        const effects = [];
        item.querySelectorAll('.effect').forEach(ef => {
          const efInputs = ef.querySelectorAll('input');
          const efSelect = ef.querySelector('select');
          effects.push({
            type: efSelect.value,
            var: efInputs[0].value,
            value: efInputs[1].value
          });
        });
        scene.buttons.push({
          label: inputs[0].value,
          target: selects[0].value,
          condition,
          effects
        });
      });

      // Зберегти змінні
      scene.variables = {};
      document.querySelectorAll('#variable-list .list-item').forEach(item => {
        const key = item.querySelector('input').value;
        const val = item.querySelector('.var-value').value;
        const type = item.querySelector('.var-type').value;
        if (key) {
          scene.variables[key] = type === 'number' ? Number(val) : type === 'boolean' ? (val === 'true') : val;
        }
      });

      localStorage.setItem('evo-scenes', JSON.stringify(scenes));
      alert('Сцену збережено!');
    };

    document.getElementById('validate-quest').onclick = () => {
      const reachable = new Set();
      const queue = ['start'];
      while (queue.length) {
        const id = queue.shift();
        if (reachable.has(id)) continue;
        reachable.add(id);
        const scene = scenes[id];
        if (!scene) continue;
        (scene.buttons || []).forEach(btn => {
          if (btn.target && !reachable.has(btn.target)) {
            queue.push(btn.target);
          }
        });
      }
      const allIds = new Set(Object.keys(scenes));
      const unreachable = [...allIds].filter(id => !reachable.has(id));
      if (unreachable.length) {
        alert('Глухі кути: ' + unreachable.map(id => scenes[id].title).join(', '));
      } else {
        alert('Квест повний, немає глухих кутів!');
      }
    };

    // === РЕЖИМ 2: 2D Аркада ===
    function setupArcadeGrid() {
      const grid = document.getElementById('arcade-grid');
      grid.innerHTML = '';
      for (let y = 0; y < 16; y++) {
        for (let x = 0; x < 16; x++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.dataset.x = x;
          cell.dataset.y = y;
          cell.onclick = (e) => {
            if (e.shiftKey) {
              cell.className = 'grid-cell';
            } else {
              cell.className = `grid-cell ${selectedCellType}`;
            }
          };
          grid.appendChild(cell);
        }
      }
    }

    document.querySelectorAll('.palette-item').forEach(item => {
      item.addEventListener('click', () => {
        if (currentMode === 'editor') {
          if (item.hasAttribute('data-type')) {
            document.querySelectorAll('.palette-item[data-type]').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            selectedCellType = item.getAttribute('data-type');
          } else if (item.hasAttribute('data-voxel')) {
            document.querySelectorAll('.palette-item[data-voxel]').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            selectedVoxelType = item.getAttribute('data-voxel');
          }
        }
      });
    });

    // === РЕЖИМ 3: Платформер ===
    // (фізика буде в ігровому режимі, тут тільки UI)

    // === РЕЖИМ 4: 3D Вокселі ===
    function setupVoxelGrid() {
      const grid = document.getElementById('voxel-grid-3d');
      grid.innerHTML = '';
      for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
          const cell = document.createElement('div');
          cell.className = 'voxel-cell';
          cell.dataset.x = x;
          cell.dataset.y = y;
          cell.onclick = () => {
            voxelWorld[currentLayer][y][x] = selectedVoxelType;
            renderVoxel3D();
          };
          grid.appendChild(cell);
        }
      }
    }

    document.getElementById('voxel-layer-slider').oninput = function() {
      currentLayer = this.value;
      document.getElementById('layer-label').textContent = this.value;
      renderVoxel3D();
    };

    function renderVoxel3D() {
      const grid = document.getElementById('voxel-grid-3d');
      const cells = grid.querySelectorAll('.voxel-cell');
      for (let i = 0; i < 64; i++) {
        const x = i % 8;
        const y = Math.floor(i / 8);
        const type = voxelWorld[currentLayer][y][x];
        const cell = cells[i];
        cell.className = `voxel-cell ${type}`;
      }
      drawVoxelPerspective();
    }

    function drawVoxelPerspective() {
      const canvas = document.getElementById('voxel-canvas');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const size = 20;
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      for (let z = 7; z >= 0; z--) {
        for (let y = 0; y < 8; y++) {
          for (let x = 0; x < 8; x++) {
            if (voxelWorld[z][y][x] === 'air') continue;
            const color = {
              solid: '#888',
              transparent: '#88f',
              active: '#f88'
            }[voxelWorld[z][y][x]];

            const screenX = centerX + (x - z * 0.5) * size;
            const screenY = centerY + (y - z * 0.5) * size;

            ctx.fillStyle = color;
            ctx.fillRect(screenX, screenY, size, size);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(screenX, screenY, size, size);
          }
        }
      }
    }

    // === Майнери ===
    function updateMinerDisplay() {
      document.getElementById('crypto').textContent = minerData.crypto;
      document.getElementById('auto-miners').textContent = minerData.autoMiners;
    }

    document.getElementById('mine-btn').onclick = () => {
      minerData.crypto++;
      updateMinerDisplay();
      saveMinerData();
    };

    document.getElementById('buy-miner').onclick = () => {
      if (minerData.crypto >= 10) {
        minerData.crypto -= 10;
        minerData.autoMiners++;
        updateMinerDisplay();
        saveMinerData();
      }
    };

    function saveMinerData() {
      localStorage.setItem('evo-miner', JSON.stringify(minerData));
    }

    setInterval(() => {
      if (currentMode === 'miner') {
        minerData.crypto += minerData.autoMiners;
        updateMinerDisplay();
        saveMinerData();
      }
    }, 1000);

    // === Чат ===
    function renderChat() {
      const box = document.getElementById('chat-box');
      box.innerHTML = '';
      chatMessages.slice(-50).forEach(msg => {
        const div = document.createElement('div');
        div.className = 'chat-message';
        div.textContent = msg;
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById('send-chat').onclick = () => {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (msg) {
        const username = profileData.name || 'Анон';
        chatMessages.push(`${username}: ${msg}`);
        input.value = '';
        renderChat();
        localStorage.setItem('evo-chat', JSON.stringify(chatMessages));
      }
    };

    document.getElementById('chat-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        document.getElementById('send-chat').click();
      }
    });

    // === Профіль ===
    function loadProfile() {
      document.getElementById('profile-name').value = profileData.name || '';
      document.getElementById('profile-email').value = profileData.email || '';
      document.getElementById('profile-github').value = profileData.github || '';
    }

    document.getElementById('save-profile').onclick = () => {
      profileData.name = document.getElementById('profile-name').value;
      profileData.email = document.getElementById('profile-email').value;
      profileData.github = document.getElementById('profile-github').value;
      localStorage.setItem('evo-profile', JSON.stringify(profileData));
      alert('Профіль збережено!');
    };

    document.getElementById('sync-github').onclick = () => {
      const gh = profileData.github;
      if (!gh) {
        alert('Вкажіть GitHub username');
        return;
      }
      alert('Синхронізація з GitHub: ' + gh + ' (імітація)');
    };

    // Ініціалізація
    (function init() {
      // Заповнити фонові пікселі
      const bgCanvas = document.getElementById('bg-canvas');
      if (!bgCanvas) return setTimeout(init, 100);
      const bgCtx = bgCanvas.getContext('2d');
      bgCtx.fillStyle = '#000';
      bgCtx.fillRect(0, 0, 64, 64);

      const charCanvas = document.getElementById('char-canvas');
      const charCtx = charCanvas.getContext('2d');
      charCtx.fillStyle = '#000';
      charCtx.fillRect(0, 0, 64, 64);

      // Завантажити сцени
      if (Object.keys(scenes).length === 0) {
        scenes['start'] = {
          id: 'start',
          title: 'Початок',
          text: 'Ласкаво просимо!',
          bgPixels: Array(64*64).fill('#000000'),
          charPixels: Array(64*64).fill('#000000'),
          buttons: [],
          variables: {}
        };
      }

      // Завантажити гру
      showScene('start');
      setMode('game');
    })();
  </script>
</body>
</html>
