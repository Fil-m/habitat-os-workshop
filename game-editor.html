<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Habitat OS — Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/evo-editor.css">
  <style>
    :root { --bg:#0b0d19; --bg2:#121526; --surface:#1e2240; --surface2:#262b50; --neon:#00f0ff; --text:#e0e4f0; --text2:#8890b0; --radius:8px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    header { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; background:var(--bg2); border-bottom:1px solid var(--surface2); flex-shrink:0; }
    .logo { font-size:16px; font-weight:600; color:var(--neon); display:flex; align-items:center; gap:6px; }
    .hdr-btns { display:flex; gap:6px; }
    .hdr-btns button { min-height:36px; padding:6px 12px; background:var(--surface2); border:1px solid var(--surface2); border-radius:var(--radius); color:var(--text); cursor:pointer; font-size:12px; }
    .hdr-btns button.neon { border-color:var(--neon); color:var(--neon); }
    .pills { display:flex; gap:4px; padding:6px 12px; background:var(--bg); border-bottom:1px solid var(--surface2); flex-shrink:0; overflow-x:auto; }
    .pill { padding:6px 12px; background:var(--surface); border:1px solid var(--surface2); border-radius:50px; color:var(--text2); cursor:pointer; font-size:12px; white-space:nowrap; min-height:34px; display:flex; align-items:center; gap:4px; }
    .pill.active { background:var(--neon); color:#000; border-color:var(--neon); font-weight:600; }
    .app { display:flex; flex:1; overflow:hidden; }
    #sidebar { width:280px; background:var(--bg2); border-right:1px solid var(--surface2); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
    #viewport { flex:1; position:relative; overflow:hidden; }
    .sec { padding:10px; border-bottom:1px solid var(--surface2); }
    .sec h3 { font-size:13px; color:var(--neon); margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
    .obj-item { padding:6px; background:var(--surface); border-radius:4px; margin-bottom:4px; cursor:pointer; font-size:12px; display:flex; justify-content:space-between; align-items:center; }
    .obj-item.active { border:1px solid var(--neon); }
    .obj-item .del { color:#f44; cursor:pointer; font-size:14px; }
    .f-row { display:flex; gap:4px; margin:4px 0; flex-wrap:wrap; }
    .f-row label { font-size:11px; color:var(--text2); min-width:50px; align-self:center; }
    .f-row input,.f-row select,.f-row textarea { flex:1; min-width:50px; padding:6px; background:var(--surface2); border:1px solid #333; border-radius:4px; color:var(--text); font-size:12px; }
    .f-row button { min-height:30px; padding:4px 10px; background:var(--surface2); border:1px solid #333; border-radius:4px; color:var(--text); cursor:pointer; font-size:11px; }
    .f-row button.primary { background:var(--neon); color:#000; font-weight:600; border-color:var(--neon); }
    .obj-types { display:flex; gap:4px; flex-wrap:wrap; }
    .type-btn { padding:6px 10px; border-radius:4px; cursor:pointer; font-size:11px; background:var(--surface2); border:1px solid #333; color:var(--text2); }
    .type-btn.active { border-color:var(--neon); color:var(--neon); }
    .tbar { display:flex; gap:4px; padding:6px 10px; background:var(--bg2); border-top:1px solid var(--surface2); flex-shrink:0; }
    .tbtn { min-height:32px; padding:4px 10px; background:var(--surface2); border:1px solid var(--surface2); border-radius:4px; color:var(--text); cursor:pointer; font-size:12px; }
    .tbtn.active { background:var(--neon); color:#000; }
    .debug { position:absolute; top:6px; left:6px; background:rgba(0,0,0,0.7); padding:4px 8px; border-radius:4px; font-size:11px; z-index:5; }
    .ev-block { background:var(--surface); border-radius:6px; padding:8px; margin:4px 0; border-left:3px solid var(--neon); }
    .ev-block .ev-header { font-size:11px; color:var(--neon); margin-bottom:4px; display:flex; justify-content:space-between; }
    .ev-block select,.ev-block input { width:100%; padding:4px; margin:2px 0; background:var(--surface2); border:1px solid #333; border-radius:3px; color:var(--text); font-size:11px; }
    .dialog-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:100; justify-content:center; align-items:center; }
    .dialog-overlay.show { display:flex; }
    .dialog-box { background:var(--surface); border:1px solid var(--surface2); border-radius:12px; padding:24px; max-width:400px; width:90%; }
    .dialog-box h3 { color:var(--neon); margin-bottom:12px; }
    .dialog-box p { margin-bottom:16px; line-height:1.6; }
    .dialog-box button { min-height:44px; padding:10px 24px; background:var(--neon); color:#000; border:none; border-radius:var(--radius); cursor:pointer; font-weight:600; margin:4px; }
    @media (max-width:600px) { #sidebar { width:100%; max-height:35vh; border-right:none; border-bottom:1px solid var(--surface2); } .app { flex-direction:column; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">⬡ Habitat OS</div>
    <div class="hdr-btns">
      <button onclick="saveAll()">💾</button>
      <button class="neon" onclick="exportWorld()">📤</button>
      <button onclick="document.getElementById('imp').click()">📥</button>
      <input type="file" id="imp" style="display:none" accept=".json">
    </div>
  </header>
  <div class="pills">
    <div class="pill active" data-mode="build">🔧 Build</div>
    <div class="pill" data-mode="logic">⚡ Logic</div>
    <div class="pill" data-mode="play">▶ Play</div>
  </div>
  <div class="app">
    <div id="sidebar">
      <div class="sec"><h3>📦 Об'єкти <button style="font-size:10px;padding:2px 6px;background:var(--surface2);border:1px solid #333;border-radius:3px;color:var(--text);cursor:pointer" onclick="addObj()">+</button></h3>
        <div class="obj-types" id="obj-types"></div>
        <div id="obj-list"></div>
      </div>
      <div class="sec" id="obj-editor" style="display:none;">
        <h3 id="obj-title">✏️ Об'єкт</h3>
        <div class="f-row"><label>Тип</label><select id="obj-type" onchange="updateObjType()"></select></div>
        <div class="f-row"><label>X</label><input type="number" id="obj-x" min="0" max="15" value="8">
          <label>Y</label><input type="number" id="obj-y" min="0" max="15" value="8">
          <label>Z</label><input type="number" id="obj-z" min="0" max="15" value="0"></div>
        <div id="obj-components"></div>
        <div class="f-row"><button class="primary" onclick="saveObj()">💾</button><button onclick="clearObj()">✕</button></div>
      </div>
      <div class="sec"><h3>🎨 Типи об'єктів</h3><div class="obj-types" id="palette"></div></div>
    </div>
    <div id="viewport">
      <div class="debug" id="debug">Habitat OS</div>
      <div class="scene" id="scene"></div>
    </div>
  </div>
  <div class="tbar" id="tbar">
    <button class="tbtn active" data-tool="add">✏️</button>
    <button class="tbtn" data-tool="erase">🧹</button>
    <button class="tbtn" id="btn-play">▶</button>
  </div>
  <div class="dialog-overlay" id="dlg"><div class="dialog-box" id="dlg-box"></div></div>
  <script src="js/evo-engine.js"></script>
  <script>
  const waitE = setInterval(()=>{ if(window.world&&window.renderer) { clearInterval(waitE); initOS(); } }, 100);

  // ================================================================
  // DATA MODEL — Object-based world
  // ================================================================
  const OBJ_TYPES = ['voxel','image','text','button','portal','npc','enemy','item'];
  const OBJ_COLORS = { voxel:'#888', image:'#44f', text:'#0ff', button:'#f44', portal:'#9c27b0', npc:'#4caf50', enemy:'#f44336', item:'#ffcc00' };

  // World = { objects: [], name, version }
  let world = { objects: [], name: 'Мій світ', version: 1 };
  let selObj = null;
  let selType = 'voxel';
  let selTool = 'add';
  let mode = 'build';

  function newObj(type) {
    const t = type || selType;
    let comps = { transform: { x: 8, y: 8, z: 0 } };
    if (t === 'voxel') comps.render = { color: OBJ_COLORS.voxel };
    else if (t === 'image') comps.render = { src: '' };
    else if (t === 'text') comps.render = { content: '', fontSize: 16 };
    else if (t === 'button') comps.logic = { events: [{ trigger: 'onClick', actions: [{ type: 'dialog', text: '...' }] }] };
    else if (t === 'portal') comps.render = { targetWorld: '' };
    else if (t === 'npc') comps.render = { dialog: '...' };
    else if (t === 'enemy') comps.health = { hp: 100, damage: 10 };
    else if (t === 'item') comps.render = { icon: '' };
    return { id: 'obj_' + Date.now(), type: t, components: comps };
  }

  // ================================================================
  // RENDER — sync objects to VoxelWorldModel
  // ================================================================
  function syncWorld() {
    if (!window.world) return;
    // Clear existing voxels
    const keys = Array.from(window.world.voxels.keys());
    keys.forEach(k => window.world.voxels.delete(k));
    window.world.triggers = [];
    window.world.entities = [];

    // Render voxel objects
    world.objects.forEach(o => {
      const t = o.components.transform;
      if (!t) return;
      if (o.type === 'voxel' && o.components.render) {
        window.world.setVoxel(t.x, t.y, t.z, { type: 'solid', color: o.components.render.color || '#888' });
      }
      if (o.type === 'button' && o.components.logic) {
        window.world.setVoxel(t.x, t.y, t.z, { type: 'solid', color: '#f44' });
        // Convert logic events to triggers
        (o.components.logic.events || []).forEach(ev => {
          if (ev.trigger === 'onEnter' || ev.trigger === 'onClick') {
            window.world.triggers.push({
              id: o.id + '_trg', tile: { x: t.x, y: t.y, z: t.z },
              event: 'onEnter', conditions: [],
              actions: ev.actions || [{ type: 'dialog', text: '...' }]
            });
          }
        });
      }
      if (o.type === 'portal') {
        window.world.setVoxel(t.x, t.y, t.z, { type: 'solid', color: '#9c27b0' });
        window.world.triggers.push({
          id: o.id + '_portal', tile: { x: t.x, y: t.y, z: t.z },
          event: 'onEnter', conditions: [],
          actions: [{ type: 'dialog', text: 'Портал: ' + (o.components.render?.targetWorld || '?') }]
        });
      }
      if (o.type === 'enemy') {
        window.world.entities.push({ id: o.id, type: 'enemy', position: { x: t.x, y: t.y, z: t.z }, variables: {} });
      }
      if (o.type === 'npc') {
        window.world.entities.push({ id: o.id, type: 'npc', position: { x: t.x, y: t.y, z: t.z }, variables: {} });
        window.world.triggers.push({
          id: o.id + '_npc', tile: { x: t.x, y: t.y, z: t.z },
          event: 'onEnter', conditions: [],
          actions: [{ type: 'dialog', text: o.components.render?.dialog || '...' }]
        });
      }
    });
    if (window.renderer) window.renderer.render();
  }

  // ================================================================
  // OBJECT EDITOR
  // ================================================================
  function renderObjTypes() {
    ['voxel','image','text','button','portal','npc','enemy','item'].forEach(t => {
      document.getElementById('palette').innerHTML += '';
    });
  }

  function renderObjList() {
    const list = document.getElementById('obj-list');
    list.innerHTML = '';
    world.objects.forEach((o, i) => {
      const d = document.createElement('div');
      d.className = 'obj-item' + (selObj === i ? ' active' : '');
      const t = o.components.transform || {};
      d.innerHTML = '<span>' + typeIcon(o.type) + ' ' + o.type + ' @' + t.x + ',' + t.y + '</span><span class="del" onclick="event.stopPropagation();delObj(' + i + ')">✕</span>';
      d.onclick = () => selectObj(i);
      list.appendChild(d);
    });
  }

  function typeIcon(t) { return { voxel:'🧱', image:'🖼️', text:'📝', button:'🔘', portal:'🌀', npc:'🧑', enemy:'👹', item:'💎' }[t] || '❓'; }

  function addObj() {
    const o = newObj(selType);
    world.objects.push(o);
    selObj = world.objects.length - 1;
    selectObj(selObj);
    renderObjList();
    syncWorld(); saveAll();
  }

  function selectObj(i) {
    selObj = i;
    renderObjList();
    const o = world.objects[i];
    if (!o) return;
    document.getElementById('obj-editor').style.display = 'block';
    document.getElementById('obj-title').textContent = '✏️ ' + typeIcon(o.type) + ' ' + o.type + ' #' + i;
    const t = o.components.transform || {};
    document.getElementById('obj-type').value = o.type;
    document.getElementById('obj-x').value = t.x || 0;
    document.getElementById('obj-y').value = t.y || 0;
    document.getElementById('obj-z').value = t.z || 0;
    updateObjType();
    // Fill component values
    setTimeout(() => {
      if (o.type === 'voxel') {
        const c = document.getElementById('comp-color');
        if (c) c.value = o.components.render?.color || '#888';
      }
      if (o.type === 'text') {
        const c = document.getElementById('comp-text');
        if (c) c.value = o.components.render?.content || '';
      }
      if (o.type === 'image') {
        const c = document.getElementById('comp-src');
        if (c) c.value = o.components.render?.src || '';
      }
      if (o.type === 'portal') {
        const c = document.getElementById('comp-target');
        if (c) c.value = o.components.render?.targetWorld || '';
      }
      if (o.type === 'npc') {
        const c = document.getElementById('comp-dialog');
        if (c) c.value = o.components.render?.dialog || '';
      }
      if (o.type === 'enemy') {
        const h = document.getElementById('comp-hp');
        if (h) h.value = o.components.health?.hp || 100;
      }
      // Logic events
      renderLogicEvents(i);
    }, 50);
  }

  function clearObj() { selObj = null; document.getElementById('obj-editor').style.display = 'none'; renderObjList(); }

  function updateObjType() {
    const type = document.getElementById('obj-type').value;
    const o = world.objects[selObj];
    if (o) o.type = type;
    const div = document.getElementById('obj-components');
    let html = '';
    if (type === 'voxel') html += '<div class="f-row"><label>Колір</label><input id="comp-color" type="color" value="#888888"></div>';
    else if (type === 'text') html += '<div class="f-row"><label>Текст</label><input id="comp-text" placeholder="Текст"></div>';
    else if (type === 'image') html += '<div class="f-row"><label>URL</label><input id="comp-src" placeholder="https://..."></div>';
    else if (type === 'button') html += '<div class="f-row"><label>Текст</label><input id="comp-btn" placeholder="Натисни"></div>';
    else if (type === 'portal') html += '<div class="f-row"><label>Світ</label><input id="comp-target" placeholder="world_name"></div>';
    else if (type === 'npc') html += '<div class="f-row"><label>Діалог</label><textarea id="comp-dialog" rows="2" placeholder="..."></textarea></div>';
    else if (type === 'enemy') html += '<div class="f-row"><label>HP</label><input id="comp-hp" type="number" value="100"><label>DMG</label><input id="comp-dmg" type="number" value="10"></div>';
    else if (type === 'item') html += '<div class="f-row"><label>Іконка</label><input id="comp-icon" placeholder="🔑"></div>';
    html += '<label style="font-size:11px;color:var(--text2);margin-top:6px;display:block;">⚡ Події</label><div id="logic-events"></div>';
    div.innerHTML = html;
    renderLogicEvents(selObj);
  }

  // ================================================================
  // SCRATCH-LIKE LOGIC EDITOR
  // ================================================================
  function renderLogicEvents(objIdx) {
    const div = document.getElementById('logic-events');
    if (!div) return;
    const o = world.objects[objIdx];
    if (!o) return;
    if (!o.components.logic) o.components.logic = { events: [] };
    div.innerHTML = '';
    o.components.logic.events.forEach((ev, ei) => {
      const block = document.createElement('div');
      block.className = 'ev-block';
      block.innerHTML = '<div class="ev-header">Коли <select onchange="updateEvent(' + objIdx + ',' + ei + ',\'trigger\',this.value)">' +
        '<option value="onEnter"' + (ev.trigger === 'onEnter' ? ' selected' : '') + '>увійшов</option>' +
        '<option value="onClick"' + (ev.trigger === 'onClick' ? ' selected' : '') + '>натиснув</option>' +
        '<option value="onCollect"' + (ev.trigger === 'onCollect' ? ' selected' : '') + '>зібрав</option>' +
        '<option value="onKill"' + (ev.trigger === 'onKill' ? ' selected' : '') + '>вбив</option>' +
        '</select><span style="color:#f44;cursor:pointer" onclick="delEvent(' + objIdx + ',' + ei + ')">✕</span></div>';
      ev.actions.forEach((a, ai) => {
        block.innerHTML += '<div class="f-row" style="margin:2px 0">→ <select onchange="updateAction(' + objIdx + ',' + ei + ',' + ai + ',\'type\',this.value)">' +
          '<option value="dialog"' + (a.type === 'dialog' ? ' selected' : '') + '>Діалог</option>' +
          '<option value="setVar"' + (a.type === 'setVar' ? ' selected' : '') + '>Змінна</option>' +
          '<option value="teleport"' + (a.type === 'teleport' ? ' selected' : '') + '>Телепорт</option>' +
          '<option value="giveItem"' + (a.type === 'giveItem' ? ' selected' : '') + '>Дати предмет</option>' +
          '</select><input value="' + (a.text || a.key || '') + '" onchange="updateAction(' + objIdx + ',' + ei + ',' + ai + ',\'text\',this.value)" placeholder="..."></div>';
      });
      block.innerHTML += '<button style="font-size:10px;padding:2px 6px;" onclick="addAction(' + objIdx + ',' + ei + ')">+ Дія</button>';
      div.appendChild(block);
    });
    div.innerHTML += '<button style="font-size:10px;padding:4px 10px;background:var(--surface2);border:1px solid #333;border-radius:4px;color:var(--text);cursor:pointer;margin-top:4px;" onclick="addEvent(' + objIdx + ')">+ Подія</button>';
  }

  function addEvent(idx) {
    const o = world.objects[idx];
    if (!o) return;
    if (!o.components.logic) o.components.logic = { events: [] };
    o.components.logic.events.push({ trigger: 'onEnter', actions: [{ type: 'dialog', text: '...' }] });
    renderLogicEvents(idx);
  }
  function delEvent(idx, ei) {
    const o = world.objects[idx];
    if (!o || !o.components.logic) return;
    o.components.logic.events.splice(ei, 1);
    renderLogicEvents(idx);
  }
  function addAction(idx, ei) {
    const o = world.objects[idx];
    if (!o || !o.components.logic) return;
    o.components.logic.events[ei].actions.push({ type: 'dialog', text: '...' });
    renderLogicEvents(idx);
  }
  function updateEvent(idx, ei, field, val) {
    const o = world.objects[idx];
    if (!o || !o.components.logic) return;
    o.components.logic.events[ei][field] = val;
  }
  function updateAction(idx, ei, ai, field, val) {
    const o = world.objects[idx];
    if (!o || !o.components.logic) return;
    o.components.logic.events[ei].actions[ai][field] = val;
  }

  function saveObj() {
    if (selObj === null) return;
    const o = world.objects[selObj];
    if (!o) return;
    o.type = document.getElementById('obj-type').value;
    if (!o.components.transform) o.components.transform = {};
    o.components.transform.x = parseInt(document.getElementById('obj-x').value) || 0;
    o.components.transform.y = parseInt(document.getElementById('obj-y').value) || 0;
    o.components.transform.z = parseInt(document.getElementById('obj-z').value) || 0;
    // Save component values
    const c = document.getElementById('comp-color');
    if (c) { if (!o.components.render) o.components.render = {}; o.components.render.color = c.value; }
    const ct = document.getElementById('comp-text');
    if (ct) { if (!o.components.render) o.components.render = {}; o.components.render.content = ct.value; }
    const cs = document.getElementById('comp-src');
    if (cs) { if (!o.components.render) o.components.render = {}; o.components.render.src = cs.value; }
    const cb = document.getElementById('comp-btn');
    if (cb) { if (!o.components.render) o.components.render = {}; o.components.render.label = cb.value; }
    const cw = document.getElementById('comp-target');
    if (cw) { if (!o.components.render) o.components.render = {}; o.components.render.targetWorld = cw.value; }
    const cd = document.getElementById('comp-dialog');
    if (cd) { if (!o.components.render) o.components.render = {}; o.components.render.dialog = cd.value; }
    const ch = document.getElementById('comp-hp');
    if (ch) { if (!o.components.health) o.components.health = {}; o.components.health.hp = parseInt(ch.value) || 100; }
    renderObjList();
    syncWorld(); saveAll();
  }

  function delObj(i) {
    world.objects.splice(i, 1);
    if (selObj === i) clearObj(); else renderObjList();
    syncWorld(); saveAll();
  }

  // ================================================================
  // MODE SWITCHING
  // ================================================================
  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      mode = p.dataset.mode;
      document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      if (mode === 'build') {
        if (window.renderer) renderer.setViewMode('3d');
        document.getElementById('obj-editor').style.display = selObj !== null ? 'block' : 'none';
      }
      if (mode === 'logic') {
        if (window.renderer) renderer.setViewMode('top');
        if (selObj !== null) selectObj(selObj);
      }
      if (mode === 'play') {
        if (window.renderer) renderer.setViewMode('3d');
        if (window.physics) window.physics.start();
      }
    });
  });
  document.getElementById('btn-play').addEventListener('click', () => {
    document.querySelector('.pill[data-mode="play"]')?.click();
  });

  // ================================================================
  // SAVE / LOAD
  // ================================================================
  function saveAll() {
    localStorage.setItem('habitat_world', JSON.stringify(world));
  }
  function exportWorld() {
    syncWorld();
    const b = new Blob([JSON.stringify(world, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = world.name + '.json'; a.click();
  }
  document.getElementById('imp').addEventListener('change', function(e) {
    const f = e.target.files[0]; if (!f) return;
    new FileReader().onload = function(ev) {
      try { world = JSON.parse(ev.target.result); renderObjList(); syncWorld(); saveAll(); } catch(err) { alert(err.message); }
    };
    (new FileReader()).readAsText(f);
  });

  // ================================================================
  // PALETTE
  // ================================================================
  function renderPalette() {
    const p = document.getElementById('palette');
    p.innerHTML = '';
    OBJ_TYPES.forEach(t => {
      const b = document.createElement('div');
      b.className = 'type-btn' + (t === selType ? ' active' : '');
      b.style.borderLeft = '3px solid ' + (OBJ_COLORS[t] || '#888');
      b.textContent = typeIcon(t) + ' ' + t;
      b.onclick = () => { selType = t; renderPalette(); };
      p.appendChild(b);
    });
  }

  // ================================================================
  // INIT
  // ================================================================
  function initOS() {
    renderPalette();
    const saved = localStorage.getItem('habitat_world');
    if (saved) { try { world = JSON.parse(saved); } catch(e) {} }
    if (!world.objects) world.objects = [];
    renderObjList();
    syncWorld();
    setInterval(saveAll, 30000);
  }
  </script>
</body>
</html>
