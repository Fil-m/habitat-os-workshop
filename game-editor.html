
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактор ігор</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f1f;
      --surface: #15182e;
      --surface2: #262b50;
      --neon: #00f0ff;
      --text: #e0e4f0;
      --text2: #8890b0;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--surface);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--surface2);
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--neon);
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      background-color: var(--surface2);
      color: var(--text);
      border: none;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background-color: #2d3360;
    }

    button.neon {
      color: var(--neon);
      border: 1px solid var(--neon);
    }

    .mode-pills {
      display: flex;
      overflow-x: auto;
      background-color: var(--surface);
      padding: 8px 16px;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .mode-pills::-webkit-scrollbar {
      display: none;
    }

    .pill {
      padding: 8px 16px;
      background-color: var(--surface2);
      border-radius: var(--radius);
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
    }

    .pill.active {
      background-color: var(--neon);
      color: var(--bg);
      font-weight: 600;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .accordion-section {
      background-color: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .accordion-header {
      padding: 16px;
      background-color: var(--surface2);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .accordion-header::after {
      content: "▼";
      font-size: 12px;
    }

    .accordion-header.open::after {
      transform: rotate(180deg);
    }

    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      padding: 0 16px;
    }

    .accordion-body.open {
      max-height: 1000px;
      padding: 16px;
    }

    input, textarea, select {
      width: 100%;
      background-color: var(--surface2);
      border: 1px solid #333;
      border-radius: var(--radius);
      padding: 12px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding: 8px 0;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background-color: var(--surface2);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .list-item.active {
      border: 1px solid var(--neon);
    }

    .list-item button {
      min-height: auto;
      min-width: auto;
      padding: 4px 8px;
      font-size: 12px;
    }

    .grid-20x15 {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(15, 1fr);
      gap: 1px;
      width: 100%;
      max-width: 343px;
      margin: 0 auto;
      aspect-ratio: 4 / 3;
      background-color: #333;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .grid-cell {
      background-color: var(--surface);
      cursor: pointer;
    }

    .grid-cell.wall { background-color: #555; }
    .grid-cell.collectible { background-color: #ffcc00; }
    .grid-cell.trigger { background-color: #9c27b0; }
    .grid-cell.door { background-color: #8b4513; }
    .grid-cell.key { background-color: #ffd700; }
    .grid-cell.enemy { background-color: #f44336; }
    .grid-cell.npc { background-color: #2196f3; }
    .grid-cell.grass { background-color: #4caf50; }
    .grid-cell.water { background-color: #2196f3; opacity: 0.6; }
    .grid-cell.lava { background-color: #ff5722; }
    .grid-cell.spikes { background-color: #795548; }
    .grid-cell.finish { background-color: #4caf50; }
    .grid-cell.platform { background-color: #8d6e63; }

    .palette {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 8px 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .palette::-webkit-scrollbar {
      display: none;
    }

    .palette-item {
      min-width: 44px;
      height: 44px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background-color: var(--surface2);
      color: var(--text2);
    }

    .palette-item.selected {
      border: 2px solid var(--neon);
    }

    .palette-item.wall { background-color: #555; }
    .palette-item.collectible { background-color: #ffcc00; color: #000; }
    .palette-item.trigger { background-color: #9c27b0; }
    .palette-item.door { background-color: #8b4513; }
    .palette-item.key { background-color: #ffd700; color: #000; }
    .palette-item.enemy { background-color: #f44336; }
    .palette-item.npc { background-color: #2196f3; }
    .palette-item.grass { background-color: #4caf50; }
    .palette-item.water { background-color: #2196f3; opacity: 0.6; }
    .palette-item.lava { background-color: #ff5722; }
    .palette-item.spikes { background-color: #795548; }
    .palette-item.finish { background-color: #4caf50; }
    .palette-item.platform { background-color: #8d6e63; }
    .palette-item.empty { background-color: var(--surface); border: 1px dashed #444; }

    .pixel-canvas {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 64px;
      height: 64px;
      gap: 0;
      border: 1px solid #444;
      margin: 12px 0;
    }

    .pixel {
      background-color: transparent;
      border: 1px solid #222;
    }

    .color-palette-8 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .color-option {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 2px solid transparent;
    }

    .color-option.selected {
      border-color: var(--neon);
    }

    .voxel-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 1px;
      width: 320px;
      height: 320px;
      background-color: #333;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .voxel-cell {
      background-color: var(--surface2);
      cursor: pointer;
    }

    .z-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .z-controls button {
      min-width: 32px;
      min-height: 32px;
      padding: 4px;
    }

    .tool-button {
      background-color: var(--surface2);
      border: 1px solid #333;
      padding: 8px;
      border-radius: var(--radius);
      margin-right: 8px;
      cursor: pointer;
    }

    .tool-button.active {
      border-color: var(--neon);
      color: var(--neon);
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .form-row input {
      flex: 1;
    }

    .form-row select {
      flex: 1;
    }

    .form-row button {
      flex: 0 0 44px;
    }

    .button-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .button-item {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .button-item input {
      margin-bottom: 0;
    }

    .button-item button {
      min-height: 44px;
      padding: 0 8px;
    }

    .conditions-list, .effects-list {
      margin-top: 8px;
      padding-left: 16px;
    }

    .condition-item, .effect-item {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .condition-item select, .effect-item select {
      flex: 1;
    }

    .condition-item input, .effect-item input {
      flex: 1;
      margin-bottom: 0;
    }

    .condition-item button, .effect-item button {
      min-height: 44px;
      padding: 0 8px;
    }

    .variable-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .variable-item {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .variable-item input, .variable-item select {
      flex: 1;
      margin-bottom: 0;
    }

    .variable-item button {
      min-height: 44px;
      padding: 0 8px;
    }

    .object-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .object-item {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .object-item input {
      flex: 1;
      margin-bottom: 0;
    }

    .object-item button {
      min-height: 44px;
      padding: 0 8px;
    }

    .dialog-input {
      width: 100%;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">EvoEditor</div>
    <div class="header-buttons">
      <button onclick="saveToStorage()">Зберегти</button>
      <button onclick="exportJson()" class="neon">Експорт</button>
      <button onclick="importJson()">Імпорт</button>
    </div>
  </header>

  <div class="mode-pills">
    <div class="pill active" onclick="switchMode(0)">Квест</div>
    <div class="pill" onclick="switchMode(1)">2D Гра</div>
    <div class="pill" onclick="switchMode(2)">Платформер</div>
    <div class="pill" onclick="switchMode(3)">3D Вокселі</div>
  </div>

  <div class="content">
    <!-- === РЕЖИМ 1: КВЕСТ === -->
    <div class="quest-mode">
      <!-- Сцени -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Сцени</div>
        <div class="accordion-body">
          <div class="list" id="scenesList"></div>
          <button onclick="addScene()">+ Додати сцену</button>
        </div>
      </div>

      <!-- Сцена -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Поточна сцена</div>
        <div class="accordion-body">
          <input type="text" id="sceneName" placeholder="Назва сцени" />
          <textarea id="sceneText" placeholder="Текст сцени"></textarea>
          <div>Фон (8x8)</div>
          <div class="pixel-canvas" id="backgroundCanvas"></div>
          <div>Персонаж (8x8)</div>
          <div class="pixel-canvas" id="characterCanvas"></div>
          <div class="color-palette-8" id="colorPaletteBg"></div>
        </div>
      </div>

      <!-- Кнопки -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Кнопки</div>
        <div class="accordion-body">
          <div class="button-list" id="buttonsList"></div>
          <button onclick="addButton()">+ Додати кнопку</button>
        </div>
      </div>

      <!-- Змінні -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Змінні</div>
        <div class="accordion-body">
          <div class="variable-list" id="variablesList"></div>
          <button onclick="addVariable()">+ Додати змінну</button>
        </div>
      </div>
    </div>

    <!-- === РЕЖИМ 2: 2D === -->
    <div class="arcade-mode" style="display:none">
      <!-- Карта -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Карта</div>
        <div class="accordion-body">
          <div class="grid-20x15" id="mapGrid"></div>
          <div class="palette" id="tilePalette"></div>
        </div>
      </div>

      <!-- Об'єкти -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Об'єкти</div>
        <div class="accordion-body">
          <div class="object-list">
            <div>
              <h4>Гравець</h4>
              <div class="form-row">
                <input type="number" id="playerX" placeholder="X" min="0" max="19" />
                <input type="number" id="playerY" placeholder="Y" min="0" max="14" />
              </div>
            </div>
            <div id="enemiesList"></div>
            <button onclick="addEnemy()">+ Ворог</button>
            <div id="npcsList"></div>
            <button onclick="addNpc()">+ NPC</button>
          </div>
        </div>
      </div>

      <!-- Параметри -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Параметри</div>
        <div class="accordion-body">
          <div class="form-row">
            <input type="number" id="gridWidth" value="20" min="5" max="50" />
            <input type="number" id="gridHeight" value="15" min="5" max="30" />
            <button onclick="resizeGrid()">Змінити</button>
          </div>
        </div>
      </div>
    </div>

    <!-- === РЕЖИМ 3: ПЛАТФОРМЕР === -->
    <div class="platformer-mode" style="display:none">
      <!-- Карта -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Карта</div>
        <div class="accordion-body">
          <div class="grid-20x15" id="platformerMapGrid"></div>
          <div class="palette" id="platformerPalette"></div>
        </div>
      </div>

      <!-- Об'єкти -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Об'єкти</div>
        <div class="accordion-body">
          <div class="object-list">
            <div>
              <h4>Гравець</h4>
              <div class="form-row">
                <input type="number" id="platPlayerX" placeholder="X" min="0" max="19" />
                <input type="number" id="platPlayerY" placeholder="Y" min="0" max="14" />
              </div>
            </div>
            <div id="platEnemiesList"></div>
            <button onclick="addPlatEnemy()">+ Ворог</button>
            <div id="platNpcsList"></div>
            <button onclick="addPlatNpc()">+ NPC</button>
          </div>
        </div>
      </div>

      <!-- Фізика -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Фізика</div>
        <div class="accordion-body">
          <div class="form-row">
            <input type="number" id="gravity" value="0.5" step="0.1" placeholder="Гравітація" />
          </div>
          <div class="form-row">
            <input type="number" id="jumpForce" value="10" step="0.5" placeholder="Сила стрибка" />
          </div>
          <div class="form-row">
            <input type="number" id="moveSpeed" value="2" step="0.1" placeholder="Швидкість" />
          </div>
          <div class="form-row">
            <input type="number" id="lives" value="3" min="1" placeholder="Життя" />
          </div>
        </div>
      </div>

      <!-- Параметри -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Параметри</div>
        <div class="accordion-body">
          <div class="form-row">
            <input type="number" id="platWidth" value="20" min="5" max="50" />
            <input type="number" id="platHeight" value="15" min="5" max="30" />
            <button onclick="resizePlatGrid()">Змінити</button>
          </div>
        </div>
      </div>
    </div>

    <!-- === РЕЖИМ 4: 3D ВОКСЕЛІ === -->
    <div class="voxel-mode" style="display:none">
      <!-- Шари -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Шари (Z)</div>
        <div class="accordion-body">
          <div class="z-controls">
            <button onclick="changeZ(-1)">-</button>
            <span id="zDisplay">Шар: 0</span>
            <button onclick="changeZ(1)">+</button>
          </div>
        </div>
      </div>

      <!-- Сітка -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Сітка (8x8)</div>
        <div class="accordion-body">
          <div class="voxel-grid" id="voxelGrid"></div>
          <div class="tool-button active" data-tool="brush">Пензель</div>
          <div class="tool-button" data-tool="eraser">Ластик</div>
        </div>
      </div>

      <!-- Палітра -->
      <div class="accordion-section">
        <div class="accordion-header">▼ Палітра кольорів</div>
        <div class="accordion-body">
          <div class="color-palette-8" id="voxelColors"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Глобальні змінні
    let state = {
      meta: { name: 'Моя гра', version: '1.0' },
      mode: 0,
      quest: { scenes: [], variables: [] },
      arcade: { width: 20, height: 15, tiles: [], player: { x: 0, y: 0 }, enemies: [], npcs: [], triggers: [] },
      platformer: { width: 20, height: 15, tiles: [], player: { x: 0, y: 0 }, enemies: [], npcs: [], triggers: [], gravity: 0.5, jumpForce: 10, moveSpeed: 2, lives: 3 },
      voxel: { voxels: Array(8).fill().map(() => Array(8).fill().map(() => Array(8).fill(0))) }
    };

    let currentSceneId = null;
    let selectedTileType = 'empty';
    let selectedColorIndex = 0;
    let currentZ = 0;
    let currentTool = 'brush';
    const colors = ['#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];

    // Ініціалізація
    function init() {
      loadFromStorage();
      setupQuestMode();
      setupArcadeMode();
      setupPlatformerMode();
      setupVoxelMode();

      // Accordion click handlers
      document.querySelectorAll('.accordion-header').forEach(h => {
        h.addEventListener('click', () => toggleAccordion(h));
      });

      // Tool buttons
      document.querySelectorAll('.tool-button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tool-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentTool = btn.dataset.tool;
        });
      });

      // Open first accordion section by default
      const firstHeader = document.querySelector('.accordion-header');
      if (firstHeader) toggleAccordion(firstHeader);

      renderAll();
    }

    function loadFromStorage() {
      const saved = localStorage.getItem('evo-editor-state');
      if (saved) {
        try {
          state = JSON.parse(saved);
        } catch (e) {
          console.error('Failed to parse saved state', e);
        }
      }
    }

    function saveToStorage() {
      localStorage.setItem('evo-editor-state', JSON.stringify(state));
      alert('Збережено!');
    }

    function exportJson() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
      const dlAnchor = document.createElement('a');
      dlAnchor.setAttribute("href", dataStr);
      dlAnchor.setAttribute("download", "game-data.json");
      document.body.appendChild(dlAnchor);
      dlAnchor.click();
      document.body.removeChild(dlAnchor);
    }

    function importJson() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
          try {
            const imported = JSON.parse(event.target.result);
            state = imported;
            renderAll();
            alert('Імпортовано!');
          } catch (err) {
            alert('Помилка при імпорті: ' + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function switchMode(index) {
      state.mode = index;
      document.querySelectorAll('.pill').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      document.querySelector('.quest-mode').style.display = index === 0 ? 'block' : 'none';
      document.querySelector('.arcade-mode').style.display = index === 1 ? 'block' : 'none';
      document.querySelector('.platformer-mode').style.display = index === 2 ? 'block' : 'none';
      document.querySelector('.voxel-mode').style.display = index === 3 ? 'block' : 'none';
      renderAll();
    }

    function toggleAccordion(header) {
      const section = header.parentElement;
      const body = section.querySelector('.accordion-body');
      const isOpen = body.classList.contains('open');

      // Закрити всі
      document.querySelectorAll('.accordion-body').forEach(b => {
        b.classList.remove('open');
        b.parentElement.querySelector('.accordion-header').classList.remove('open');
      });

      // Відкрити поточний, якщо був закритий
      if (!isOpen) {
        body.classList.add('open');
        header.classList.add('open');
      }
    }

    // === КВЕСТ ===
    function setupQuestMode() {
      // Колірна палітра для фону
      const palette = document.getElementById('colorPaletteBg');
      colors.forEach((color, index) => {
        const btn = document.createElement('div');
        btn.className = 'color-option';
        btn.style.backgroundColor = color;
        btn.dataset.index = index;
        btn.onclick = () => {
          selectedColorIndex = index;
          document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        };
        if (index === 0) btn.classList.add('selected');
        palette.appendChild(btn);
      });
    }

    function renderQuestMode() {
      renderScenesList();
      renderCurrentScene();
      renderButtonsList();
      renderVariablesList();
    }

    function renderScenesList() {
      const list = document.getElementById('scenesList');
      list.innerHTML = '';
      state.quest.scenes.forEach((scene, index) => {
        const item = document.createElement('div');
        item.className = 'list-item';
        if (index === currentSceneId) item.classList.add('active');
        item.textContent = scene.name || `Сцена ${index}`;
        item.onclick = () => {
          currentSceneId = index;
          renderCurrentScene();
          document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
        };
        list.appendChild(item);
      });
    }

    function addScene() {
      state.quest.scenes.push({
        name: `Нова сцена ${state.quest.scenes.length + 1}`,
        text: '',
        background: Array(64).fill(0),
        character: Array(64).fill(0)
      });
      currentSceneId = state.quest.scenes.length - 1;
      renderScenesList();
      renderCurrentScene();
    }

    function renderCurrentScene() {
      if (currentSceneId === null || !state.quest.scenes[currentSceneId]) return;
      const scene = state.quest.scenes[currentSceneId];
      document.getElementById('sceneName').value = scene.name;
      document.getElementById('sceneText').value = scene.text;
      renderPixelCanvas('backgroundCanvas', scene.background);
      renderPixelCanvas('characterCanvas', scene.character);

      // Auto-save on input
      document.getElementById('sceneName').oninput = function() {
        scene.name = this.value;
      };
      document.getElementById('sceneText').oninput = function() {
        scene.text = this.value;
      };
    }

    function renderPixelCanvas(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      canvas.innerHTML = '';
      data.forEach((colorIndex, i) => {
        const pixel = document.createElement('div');
        pixel.className = 'pixel';
        pixel.style.backgroundColor = colors[colorIndex] || '#000';
        pixel.dataset.index = i;
        pixel.onclick = () => {
          const scene = state.quest.scenes[currentSceneId];
          const arr = canvasId === 'backgroundCanvas' ? scene.background : scene.character;
          arr[i] = selectedColorIndex;
        };
        canvas.appendChild(pixel);
      });
    }

    function addButton() {
      if (currentSceneId === null) return;
      const scene = state.quest.scenes[currentSceneId];
      if (!scene.buttons) scene.buttons = [];
      scene.buttons.push({ label: 'Нова кнопка', targetScene: 0, conditions: [], effects: [] });
      renderButtonsList();
    }

    function renderButtonsList() {
      const list = document.getElementById('buttonsList');
      list.innerHTML = '';
      if (currentSceneId === null) return;
      const scene = state.quest.scenes[currentSceneId];
      if (!scene.buttons) scene.buttons = [];
      scene.buttons.forEach((btn, idx) => {
        const item = document.createElement('div');
        item.className = 'button-item';
        item.innerHTML = `
          <input type="text" value="${btn.label}" placeholder="Текст кнопки" oninput="updateButton(${idx}, 'label', this.value)" />
          <select onchange="updateButton(${idx}, 'targetScene', parseInt(this.value))">
            ${state.quest.scenes.map((s, i) => `<option value="${i}" ${i === btn.targetScene ? 'selected' : ''}>${s.name}</option>`).join('')}
          </select>
          <button onclick="removeButton(${idx})">✕</button>
        `;
        list.appendChild(item);

        // Умови
        const conditions = document.createElement('div');
        conditions.className = 'conditions-list';
        btn.conditions.forEach((cond, cidx) => {
          const condEl = document.createElement('div');
          condEl.className = 'condition-item';
          condEl.innerHTML = `
            <select onchange="updateCondition(${idx}, ${cidx}, 'var', this.value)">
              ${state.quest.variables.map(v => `<option value="${v.name}" ${v.name === cond.var ? 'selected' : ''}>${v.name}</option>`).join('')}
            </select>
            <select onchange="updateCondition(${idx}, ${cidx}, 'op', this.value)">
              <option value="==" ${cond.op === '==' ? 'selected' : ''}>=</option>
              <option value="!=" ${cond.op === '!=' ? 'selected' : ''}>&#8800;</option>
              <option value=">" ${cond.op === '>' ? 'selected' : ''}>&gt;</option>
              <option value="<" ${cond.op === '<' ? 'selected' : ''}>&lt;</option>
            </select>
            <input type="text" value="${cond.val}" oninput="updateCondition(${idx}, ${cidx}, 'val', this.value)" />
            <button onclick="removeCondition(${idx}, ${cidx})">✕</button>
          `;
          conditions.appendChild(condEl);
        });
        const addCondBtn = document.createElement('button');
        addCondBtn.textContent = '+ Умова';
        addCondBtn.onclick = () => addCondition(idx);
        conditions.appendChild(addCondBtn);
        item.appendChild(conditions);

        // Ефекти
        const effects = document.createElement('div');
        effects.className = 'effects-list';
        btn.effects.forEach((eff, eidx) => {
          const effEl = document.createElement('div');
          effEl.className = 'effect-item';
          effEl.innerHTML = `
            <select onchange="updateEffect(${idx}, ${eidx}, 'var', this.value)">
              <option value="">(нова)</option>
              ${state.quest.variables.map(v => `<option value="${v.name}" ${v.name === eff.var ? 'selected' : ''}>${v.name}</option>`).join('')}
            </select>
            <input type="text" value="${eff.val}" oninput="updateEffect(${idx}, ${eidx}, 'val', this.value)" placeholder="Значення" />
            <button onclick="removeEffect(${idx}, ${eidx})">✕</button>
          `;
          effects.appendChild(effEl);
        });
        const addEffBtn = document.createElement('button');
        addEffBtn.textContent = '+ Ефект';
        addEffBtn.onclick = () => addEffect(idx);
        effects.appendChild(addEffBtn);
        item.appendChild(effects);
      });
    }

    function updateButton(idx, field, value) {
      state.quest.scenes[currentSceneId].buttons[idx][field] = value;
    }

    function removeButton(idx) {
      state.quest.scenes[currentSceneId].buttons.splice(idx, 1);
      renderButtonsList();
    }

    function addCondition(btnIdx) {
      state.quest.scenes[currentSceneId].buttons[btnIdx].conditions.push({ var: '', op: '==', val: '' });
      renderButtonsList();
    }

    function updateCondition(btnIdx, condIdx, field, value) {
      state.quest.scenes[currentSceneId].buttons[btnIdx].conditions[condIdx][field] = value;
    }

    function removeCondition(btnIdx, condIdx) {
      state.quest.scenes[currentSceneId].buttons[btnIdx].conditions.splice(condIdx, 1);
      renderButtonsList();
    }

    function addEffect(btnIdx) {
      state.quest.scenes[currentSceneId].buttons[btnIdx].effects.push({ var: '', val: '' });
      renderButtonsList();
    }

    function updateEffect(btnIdx, effIdx, field, value) {
      state.quest.scenes[currentSceneId].buttons[btnIdx].effects[effIdx][field] = value;
    }

    function removeEffect(btnIdx, effIdx) {
      state.quest.scenes[currentSceneId].buttons[btnIdx].effects.splice(effIdx, 1);
      renderButtonsList();
    }

    function addVariable() {
      state.quest.variables.push({ name: `var${state.quest.variables.length}`, type: 'number', value: 0 });
      renderVariablesList();
    }

    function renderVariablesList() {
      const list = document.getElementById('variablesList');
      list.innerHTML = '';
      state.quest.variables.forEach((v, idx) => {
        const item = document.createElement('div');
        item.className = 'variable-item';
        item.innerHTML = `
          <input type="text" value="${v.name}" oninput="updateVariable(${idx}, 'name', this.value)" />
          <select onchange="updateVariable(${idx}, 'type', this.value)">
            <option value="number" ${v.type === 'number' ? 'selected' : ''}>Число</option>
            <option value="boolean" ${v.type === 'boolean' ? 'selected' : ''}>Логічне</option>
            <option value="string" ${v.type === 'string' ? 'selected' : ''}>Текст</option>
          </select>
          <input type="text" value="${v.value}" oninput="updateVariable(${idx}, 'value', this.value)" />
          <button onclick="removeVariable(${idx})">✕</button>
        `;
        list.appendChild(item);
      });
    }

    function updateVariable(idx, field, value) {
      if (field === 'value') {
        if (state.quest.variables[idx].type === 'number') value = parseFloat(value);
        if (state.quest.variables[idx].type === 'boolean') value = value === 'true';
      }
      state.quest.variables[idx][field] = value;
    }

    function removeVariable(idx) {
      state.quest.variables.splice(idx, 1);
      renderVariablesList();
    }

    // === 2D АРКАДА ===
    function setupArcadeMode() {
      renderArcadeGrid();
      renderTilePalette('tilePalette', 'arcade');
      document.getElementById('playerX').value = state.arcade.player.x;
      document.getElementById('playerY').value = state.arcade.player.y;
      document.getElementById('gridWidth').value = state.arcade.width;
      document.getElementById('gridHeight').value = state.arcade.height;
      renderEnemiesList('enemiesList', 'arcade');
      renderNpcsList('npcsList', 'arcade');

      // Auto-save player pos
      document.getElementById('playerX').oninput = function() { state.arcade.player.x = parseInt(this.value) || 0; };
      document.getElementById('playerY').oninput = function() { state.arcade.player.y = parseInt(this.value) || 0; };
    }

    function renderArcadeGrid() {
      const grid = document.getElementById('mapGrid');
      grid.innerHTML = '';
      if (!state.arcade.tiles.length) {
        state.arcade.tiles = Array(state.arcade.height).fill().map(() => Array(state.arcade.width).fill('empty'));
      }
      const cellSize = Math.floor(Math.min(343 / state.arcade.width, 257 / state.arcade.height));
      state.arcade.tiles.forEach((row, y) => {
        row.forEach((tile, x) => {
          const cell = document.createElement('div');
          cell.className = 'grid-cell ' + tile;
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          cell.onclick = () => {
            state.arcade.tiles[y][x] = selectedTileType;
            renderArcadeGrid();
          };
          cell.oncontextmenu = (e) => { e.preventDefault(); state.arcade.tiles[y][x] = 'empty'; renderArcadeGrid(); };
          grid.appendChild(cell);
        });
      });
    }

    function renderTilePalette(paletteId, mode) {
      const palette = document.getElementById(paletteId);
      palette.innerHTML = '';
      const types = ['empty','wall','collectible','trigger','door','key','enemy','npc','grass','water','lava','spikes','finish'];
      if (mode === 'platformer') types.push('platform');
      types.forEach(type => {
        const item = document.createElement('div');
        item.className = 'palette-item ' + type + (type === selectedTileType ? ' selected' : '');
        item.textContent = type === 'empty' ? '∅' : type[0].toUpperCase();
        item.onclick = () => { selectedTileType = type; renderTilePalette(paletteId, mode); };
        palette.appendChild(item);
      });
    }

    function addEnemy() {
      state.arcade.enemies.push({ x: 0, y: 0, ai: 'patrol' });
      renderEnemiesList('enemiesList', 'arcade');
    }

    function addNpc() {
      state.arcade.npcs.push({ x: 0, y: 0, dialog: '' });
      renderNpcsList('npcsList', 'arcade');
    }

    function renderEnemiesList(listId, mode) {
      const list = document.getElementById(listId);
      list.innerHTML = '';
      const data = mode === 'arcade' ? state.arcade.enemies : state.platformer.enemies;
      data.forEach((enemy, idx) => {
        const item = document.createElement('div');
        item.className = 'object-item';
        item.innerHTML = '<input type="number" value="' + enemy.x + '" onchange="updateEnemy(' + idx + ',\'x\',this.value,\'' + mode + '\')" min="0" />' +
          '<input type="number" value="' + enemy.y + '" onchange="updateEnemy(' + idx + ',\'y\',this.value,\'' + mode + '\')" min="0" />' +
          '<button onclick="removeEnemy(' + idx + ',\'' + mode + '\')">✕</button>';
        list.appendChild(item);
      });
    }

    function renderNpcsList(listId, mode) {
      const list = document.getElementById(listId);
      list.innerHTML = '';
      const data = mode === 'arcade' ? state.arcade.npcs : state.platformer.npcs;
      data.forEach((npc, idx) => {
        const item = document.createElement('div');
        item.className = 'object-item';
        item.innerHTML = '<input type="number" value="' + npc.x + '" onchange="updateNpc(' + idx + ',\'x\',this.value,\'' + mode + '\')" min="0" />' +
          '<input type="number" value="' + npc.y + '" onchange="updateNpc(' + idx + ',\'y\',this.value,\'' + mode + '\')" min="0" />' +
          '<input class="dialog-input" type="text" value="' + (npc.dialog || '') + '" onchange="updateNpc(' + idx + ',\'dialog\',this.value,\'' + mode + '\')" placeholder="Діалог" />' +
          '<button onclick="removeNpc(' + idx + ',\'' + mode + '\')">✕</button>';
        list.appendChild(item);
      });
    }

    function updateEnemy(idx, field, value, mode) {
      const data = mode === 'arcade' ? state.arcade.enemies : state.platformer.enemies;
      data[idx][field] = parseInt(value);
    }
    function removeEnemy(idx, mode) {
      const data = mode === 'arcade' ? state.arcade.enemies : state.platformer.enemies;
      data.splice(idx, 1);
      renderEnemiesList(mode === 'arcade' ? 'enemiesList' : 'platEnemiesList', mode);
    }
    function updateNpc(idx, field, value, mode) {
      const data = mode === 'arcade' ? state.arcade.npcs : state.platformer.npcs;
      data[idx][field] = field === 'dialog' ? value : parseInt(value);
    }
    function removeNpc(idx, mode) {
      const data = mode === 'arcade' ? state.arcade.npcs : state.platformer.npcs;
      data.splice(idx, 1);
      renderNpcsList(mode === 'arcade' ? 'npcsList' : 'platNpcsList', mode);
    }
    function resizeGrid() {
      state.arcade.width = parseInt(document.getElementById('gridWidth').value);
      state.arcade.height = parseInt(document.getElementById('gridHeight').value);
      state.arcade.tiles = Array(state.arcade.height).fill().map(() => Array(state.arcade.width).fill('empty'));
      renderArcadeGrid();
    }

    // === ПЛАТФОРМЕР ===
    function setupPlatformerMode() {
      renderPlatformerGrid();
      renderTilePalette('platformerPalette', 'platformer');
      document.getElementById('platPlayerX').value = state.platformer.player.x;
      document.getElementById('platPlayerY').value = state.platformer.player.y;
      document.getElementById('platWidth').value = state.platformer.width;
      document.getElementById('platHeight').value = state.platformer.height;
      document.getElementById('gravity').value = state.platformer.gravity;
      document.getElementById('jumpForce').value = state.platformer.jumpForce;
      document.getElementById('moveSpeed').value = state.platformer.moveSpeed;
      document.getElementById('lives').value = state.platformer.lives;
      renderEnemiesList('platEnemiesList', 'platformer');
      renderNpcsList('platNpcsList', 'platformer');

      // Auto-save physics
      document.getElementById('platPlayerX').oninput = function() { state.platformer.player.x = parseInt(this.value) || 0; };
      document.getElementById('platPlayerY').oninput = function() { state.platformer.player.y = parseInt(this.value) || 0; };
      document.getElementById('gravity').oninput = function() { state.platformer.gravity = parseFloat(this.value) || 0; };
      document.getElementById('jumpForce').oninput = function() { state.platformer.jumpForce = parseFloat(this.value) || 0; };
      document.getElementById('moveSpeed').oninput = function() { state.platformer.moveSpeed = parseFloat(this.value) || 0; };
      document.getElementById('lives').oninput = function() { state.platformer.lives = parseInt(this.value) || 1; };
    }

    function renderPlatformerGrid() {
      const grid = document.getElementById('platformerMapGrid');
      grid.innerHTML = '';
      if (!state.platformer.tiles.length) {
        state.platformer.tiles = Array(state.platformer.height).fill().map(() => Array(state.platformer.width).fill('empty'));
      }
      const cellSize = Math.floor(Math.min(343 / state.platformer.width, 257 / state.platformer.height));
      state.platformer.tiles.forEach((row, y) => {
        row.forEach((tile, x) => {
          const cell = document.createElement('div');
          cell.className = 'grid-cell ' + tile;
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          cell.onclick = () => {
            state.platformer.tiles[y][x] = selectedTileType;
            renderPlatformerGrid();
          };
          cell.oncontextmenu = (e) => { e.preventDefault(); state.platformer.tiles[y][x] = 'empty'; renderPlatformerGrid(); };
          grid.appendChild(cell);
        });
      });
    }

    function addPlatEnemy() {
      state.platformer.enemies.push({ x: 0, y: 0, ai: 'patrol' });
      renderEnemiesList('platEnemiesList', 'platformer');
    }
    function addPlatNpc() {
      state.platformer.npcs.push({ x: 0, y: 0, dialog: '' });
      renderNpcsList('platNpcsList', 'platformer');
    }
    function resizePlatGrid() {
      state.platformer.width = parseInt(document.getElementById('platWidth').value);
      state.platformer.height = parseInt(document.getElementById('platHeight').value);
      state.platformer.tiles = Array(state.platformer.height).fill().map(() => Array(state.platformer.width).fill('empty'));
      renderPlatformerGrid();
    }

    // === 3D ВОКСЕЛІ ===
    function setupVoxelMode() {
      setupVoxelPalette();
      renderVoxelGrid();
    }

    function setupVoxelPalette() {
      const palette = document.getElementById('voxelColors');
      palette.innerHTML = '';
      colors.forEach((color, index) => {
        const btn = document.createElement('div');
        btn.className = 'color-option' + (index === selectedColorIndex ? ' selected' : '');
        btn.style.backgroundColor = color;
        btn.onclick = () => {
          selectedColorIndex = index;
          document.querySelectorAll('#voxelColors .color-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        };
        palette.appendChild(btn);
      });
    }

    function renderVoxelGrid() {
      const grid = document.getElementById('voxelGrid');
      grid.innerHTML = '';
      for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
          const cell = document.createElement('div');
          cell.className = 'voxel-cell';
          const val = state.voxel.voxels[currentZ][y][x];
          if (val !== 0) {
            cell.style.backgroundColor = colors[val] || '#333';
          }
          cell.onclick = () => {
            if (currentTool === 'brush') {
              state.voxel.voxels[currentZ][y][x] = selectedColorIndex;
            } else {
              state.voxel.voxels[currentZ][y][x] = 0;
            }
            renderVoxelGrid();
          };
          grid.appendChild(cell);
        }
      }
      document.getElementById('zDisplay').textContent = 'Шар: ' + currentZ;
    }

    function changeZ(delta) {
      currentZ = Math.max(0, Math.min(7, currentZ + delta));
      renderVoxelGrid();
    }

    // === РЕНДЕР ВСЬОГО ===
    function renderAll() {
      if (state.mode === 0) renderQuestMode();
      else if (state.mode === 1) setupArcadeMode();
      else if (state.mode === 2) setupPlatformerMode();
      else if (state.mode === 3) setupVoxelMode();
    }

    // Запуск
    window.addEventListener('load', init);
  </script>
</body>
</html>
