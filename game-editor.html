<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Evo-Engine — Game Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/evo-editor.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <style>
    /* ===== LAYOUT ===== */
    .app-layout { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--surface2); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
    #viewport-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    @media (max-width: 600px) { #sidebar { width: 100%; max-height: 35vh; border-right: none; border-bottom: 1px solid var(--surface2); } .app-layout { flex-direction: column; } }

    /* ===== MODE PILLS ===== */
    .mode-pills { display: flex; gap: 6px; padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--surface2); flex-shrink: 0; overflow-x: auto; }
    .pill { padding: 8px 14px; background: var(--surface); border: 1px solid var(--surface2); border-radius: 50px; color: var(--text2); cursor: pointer; font-size: 13px; white-space: nowrap; min-height: 40px; display: flex; align-items: center; gap: 4px; transition: all .2s; }
    .pill.active { background: var(--neon); color: #000; border-color: var(--neon); font-weight: 600; }

    /* ===== SIDEBAR ===== */
    .side-sec { padding: 12px; border-bottom: 1px solid var(--surface2); }
    .side-sec h3 { font-size: 14px; color: var(--neon); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .sc-item, .tr-item { padding: 8px; background: var(--surface); border-radius: var(--radius); margin-bottom: 4px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .sc-item.active, .tr-item.active { border: 1px solid var(--neon); }
    .sc-item .del, .tr-item .del { color: #f44; cursor: pointer; font-size: 16px; }
    .tr-item .desc { font-size: 11px; color: var(--text2); }

    /* ===== ACTION EDITOR ===== */
    .f-row { display: flex; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
    .f-row label { font-size: 12px; color: var(--text2); min-width: 60px; align-self: center; }
    .f-row input, .f-row select, .f-row textarea { flex: 1; min-width: 60px; padding: 8px; background: var(--surface2); border: 1px solid #333; border-radius: 6px; color: var(--text); font-size: 13px; }
    .f-row button { min-height: 36px; padding: 6px 14px; background: var(--surface2); border: 1px solid #333; border-radius: 6px; color: var(--text); cursor: pointer; font-size: 13px; }
    .f-row button.primary { background: var(--neon); color: #000; font-weight: 600; border-color: var(--neon); }

    /* ===== VARIABLES ===== */
    .var-display { font-size: 12px; padding: 4px 0; color: var(--text2); display: flex; justify-content: space-between; }

    /* ===== PALETTE ===== */
    .pal-bar { display: flex; gap: 4px; flex-wrap: wrap; }
    .pal-item { width: 32px; height: 32px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: border-color .2s; }
    .pal-item.active { border-color: var(--neon); }
    .pal-item.empty { border: 2px dashed #555; background: transparent; }

    /* ===== TOOLBAR ===== */
    .tbar { display: flex; gap: 4px; padding: 8px 12px; background: var(--bg2); border-top: 1px solid var(--surface2); flex-shrink: 0; flex-wrap: wrap; }
    .tbtn { min-height: 36px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--surface2); border-radius: 6px; color: var(--text); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 4px; }
    .tbtn.active { background: var(--neon); color: #000; border-color: var(--neon); }
    .tbtn.play { border-color: #00ff88; color: #00ff88; }

    /* ===== DEBUG ===== */
    .debug { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 4px; font-size: 12px; z-index: 5; }

    /* ===== DIALOG ===== */
    .dialog-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .dialog-overlay.show { display: flex; }
    .dialog-box { background: var(--surface); border: 1px solid var(--surface2); border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; }
    .dialog-box h3 { color: var(--neon); margin-bottom: 12px; }
    .dialog-box p { margin-bottom: 16px; line-height: 1.6; }
    .dialog-box button { min-height: 44px; padding: 10px 24px; background: var(--neon); color: #000; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; margin: 4px; }

    /* ===== PLAY CONTROLS ===== */
    #play-ctrl { display:none; position:absolute; bottom:16px; left:16px; right:16px; justify-content:space-between; pointer-events:none; }
    #play-ctrl .info { color:yellow; font-weight:bold; background:rgba(0,0,0,0.5); padding:8px 14px; border-radius:6px; font-size:12px; }
    #play-ctrl #btn-stop { pointer-events:auto; background:red; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; }

    /* ===== HEADER ===== */
    header .hdr-btns { display: flex; gap: 6px; }
    header .hdr-btns button { min-height: 36px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--surface2); border-radius: var(--radius); color: var(--text); cursor: pointer; font-size: 12px; }
    header .hdr-btns button.neon { border-color: var(--neon); color: var(--neon); }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="title" style="font-size:18px;font-weight:600;color:var(--neon);display:flex;align-items:center;gap:8px;">⬡ Evo-Engine</div>
    <div class="hdr-btns">
      <button onclick="saveAll()">💾</button>
      <button class="neon" onclick="exportAll()">📤</button>
      <button onclick="document.getElementById('import-file').click()">📥</button>
      <input type="file" id="import-file" style="display:none" accept=".json">
    </div>
  </header>

  <!-- MODE PILLS -->
  <div class="mode-pills">
    <div class="pill active" data-view="3d">🧊 3D</div>
    <div class="pill" data-view="top">🗺️ Карта</div>
    <div class="pill" data-view="quest">📜 Квест</div>
    <div class="pill" data-view="play">▶ Грати</div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="app-layout">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="side-sec">
        <h3>🎬 Сцени <button style="font-size:11px;padding:2px 8px;background:var(--surface2);border:1px solid #333;border-radius:4px;color:var(--text);cursor:pointer" onclick="addScene()">+</button></h3>
        <div id="scene-list"></div>
      </div>
      <div class="side-sec">
        <h3>⚡ Тригери <button style="font-size:11px;padding:2px 8px;background:var(--surface2);border:1px solid #333;border-radius:4px;color:var(--text);cursor:pointer" onclick="addTrigger()">+</button></h3>
        <div id="tr-list"></div>
      </div>
      <div class="side-sec" id="act-editor" style="display:none;">
        <h3 id="act-title">✏️ Дія</h3>
        <div class="f-row"><label>Тип</label><select id="act-type" onchange="updateActUI()"><option value="dialog">📝 Діалог</option><option value="setVar">🔢 Змінна</option><option value="teleport">🌀 Телепорт</option></select></div>
        <div id="act-params"></div>
        <div class="f-row"><button class="primary" onclick="saveTrigger()">💾 Зберегти</button><button onclick="clearTrigger()">✕ Закрити</button></div>
      </div>
      <div class="side-sec">
        <h3>📊 Змінні</h3>
        <div id="vars-disp"></div>
        <div class="f-row"><input id="vk" placeholder="Ключ"><input id="vv" placeholder="Значення"><button onclick="addVar()">+</button></div>
      </div>
      <div class="side-sec">
        <h3>🎨 Типи</h3>
        <div class="pal-bar" id="pal-bar"></div>
      </div>
    </div>

    <!-- VIEWPORT -->
    <div id="viewport-wrap">
      <div class="viewport" id="viewport" style="position:relative;flex:1;overflow:hidden;">
        <div class="debug" id="debug">⬡ Evo-Engine</div>
        <div class="scene" id="scene"></div>
        <div id="play-ctrl">
          <div class="info">▶ WASD + Space</div>
          <button id="btn-stop">⏹ Стоп</button>
        </div>
      </div>
      <div class="tbar" id="tbar">
        <button class="tbtn active" data-tool="add">✏️</button>
        <button class="tbtn" data-tool="erase">🧹</button>
        <button class="tbtn" id="btn-undo">↩️</button>
        <button class="tbtn" id="btn-redo">↪️</button>
        <button class="tbtn play" id="btn-play">▶</button>
      </div>
    </div>
  </div>

  <!-- DIALOG -->
  <div class="dialog-overlay" id="dlg-overlay"><div class="dialog-box" id="dlg-box"></div></div>

  <!-- EVO ENGINE -->
  <script src="js/evo-engine.js"></script>

  <!-- CUSTOM JS -->
  <script>
  // ================================================================
  // WAIT FOR EVO-ENGINE
  // ================================================================
  const waitE = setInterval(() => {
    if (window.world && window.renderer) { clearInterval(waitE); initApp(); }
  }, 100);

  // ================================================================
  // PROJECT DATA — one structure for all modes
  // ================================================================
  const PROJECT_KEY = 'evo_game';
  const TILES = ['empty','wall','player_start','goal','collectible','enemy','npc','door','key','hazard','trigger','platform'];
  const TCOLORS = {
    empty:'transparent', wall:'#555', player_start:'#44f', goal:'#4caf50',
    collectible:'#ffcc00', enemy:'#f44336', npc:'#2196f3', door:'#8b4513',
    key:'#ffd700', hazard:'#ff5722', trigger:'#9c27b0', platform:'#8d6e63'
  };
  let selTile = 'wall';
  let selTrigger = null;
  let scIdx = 0;

  let project = {
    scenes: [], currentScene: 0, globalVars: {}, view: '3d'
  };

  function mkScene(n) {
    return {
      id: Date.now(), name: n || 'Рівень 1', mode: '3d',
      text: '', bg: null, ch: null,
      tiles: [], triggers: [], buttons: [],
      worldJSON: null,
      physics: { gravity: false, jump: 10, speed: 3, lives: 3 }
    };
  }

  // ================================================================
  // SCENE MANAGEMENT
  // ================================================================
  function addScene() {
    const s = mkScene('Рівень ' + (project.scenes.length + 1));
    project.scenes.push(s);
    goScene(project.scenes.length - 1);
    renderScenes(); saveAll();
  }
  function goScene(i) {
    if (i < 0 || i >= project.scenes.length) return;
    // Save current
    if (window.world && project.scenes[scIdx]) {
      project.scenes[scIdx].triggers = JSON.parse(JSON.stringify(window.world.triggers || []));
      try { project.scenes[scIdx].worldJSON = window.world.toJSON(); } catch(e) {}
    }
    scIdx = i;
    const s = project.scenes[i];
    // Set view mode
    const vb = document.querySelector('.pill[data-view="' + s.mode + '"]');
    if (vb && s.mode !== 'play') vb.click();
    // Load world
    if (window.world && s.worldJSON) {
      try { window.world.fromJSON(s.worldJSON); } catch(e) {}
      window.world.triggers = s.triggers || [];
      if (window.renderer) window.renderer.render();
    }
    renderScenes(); renderTriggers();
  }
  function delScene(i) {
    if (project.scenes.length <= 1) return;
    project.scenes.splice(i, 1);
    if (scIdx >= project.scenes.length) scIdx = project.scenes.length - 1;
    goScene(scIdx); saveAll();
  }
  function renderScenes() {
    const list = document.getElementById('scene-list');
    list.innerHTML = '';
    project.scenes.forEach((s, i) => {
      const d = document.createElement('div');
      d.className = 'sc-item' + (i === scIdx ? ' active' : '');
      const ic = s.mode === 'text' ? '📜' : s.mode === '2d' ? '🎮' : '🧊';
      d.innerHTML = '<span>' + ic + ' ' + s.name + '</span><span class="del" onclick="event.stopPropagation();delScene(' + i + ')">✕</span>';
      d.onclick = () => goScene(i);
      list.appendChild(d);
    });
  }

  // ================================================================
  // VIEW SWITCHING
  // ================================================================
  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      const v = p.dataset.view;
      document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      // Update scene mode
      if (project.scenes[scIdx] && ['3d','top','quest'].includes(v)) {
        project.scenes[scIdx].mode = v === 'quest' ? 'text' : v;
      }
      if (v === '3d') { if (window.renderer) renderer.setViewMode('3d'); showTools(1); }
      else if (v === 'top') { if (window.renderer) renderer.setViewMode('top'); showTools(1); }
      else if (v === 'quest') { if (window.renderer) renderer.setViewMode('top'); showTools(0); renderTriggers(); }
      else if (v === 'play') { playGame(); }
    });
  });
  function showTools(s) {
    document.querySelectorAll('.tbtn').forEach(b => b.style.display = s ? '' : 'none');
    document.getElementById('btn-play').style.display = '';
  }

  // ================================================================
  // TRIGGERS
  // ================================================================
  function trigs() { return window.world ? window.world.triggers : []; }
  function addTrigger() {
    if (!window.world) return;
    const p = window.world.entities.find(e => e.type === 'player_start');
    const pos = p ? p.position : { x: 8, y: 8, z: 0 };
    window.world.triggers.push({
      id: 't' + Date.now(), tile: { x: Math.round(pos.x), y: Math.round(pos.y), z: 0 },
      event: 'onEnter', conditions: [],
      actions: [{ type: 'dialog', text: '...' }]
    });
    renderTriggers(); saveWorld();
  }
  function renderTriggers() {
    const list = document.getElementById('tr-list');
    list.innerHTML = '';
    trigs().forEach((t, i) => {
      const d = document.createElement('div');
      d.className = 'tr-item' + (selTrigger === i ? ' active' : '');
      const a = t.actions && t.actions[0] ? t.actions[0] : {};
      const desc = a.text || a.type || '?';
      d.innerHTML = '<span><b>#' + i + '</b> @' + t.tile.x + ',' + t.tile.y +
        '<br><span class="desc">' + desc + '</span></span>' +
        '<span class="del" onclick="event.stopPropagation();delTrigger(' + i + ')">✕</span>';
      d.onclick = () => selectTrigger(i);
      list.appendChild(d);
    });
  }
  function selectTrigger(i) {
    selTrigger = i; renderTriggers();
    const t = trigs()[i]; if (!t) return;
    document.getElementById('act-editor').style.display = 'block';
    document.getElementById('act-title').textContent = '✏️ Тригер #' + i + ' @' + t.tile.x + ',' + t.tile.y;
    const a = t.actions && t.actions[0] ? t.actions[0] : { type: 'dialog', text: '' };
    document.getElementById('act-type').value = a.type || 'dialog';
    updateActUI();
    setTimeout(() => {
      if (a.type === 'dialog') { const ta = document.getElementById('ad'); if (ta) ta.value = a.text || ''; }
      else if (a.type === 'setVar') {
        const k = document.getElementById('avk'); const vv = document.getElementById('avv');
        if (k) k.value = a.key || ''; if (vv) vv.value = a.value !== undefined ? a.value : '';
      }
      else if (a.type === 'teleport') {
        const sx = document.getElementById('asc'), tx = document.getElementById('atx'),
              ty = document.getElementById('aty'), tz = document.getElementById('atz');
        if (sx) sx.value = a.sceneId !== undefined ? a.sceneId : scIdx;
        if (tx) tx.value = a.to ? a.to.x : 8;
        if (ty) ty.value = a.to ? a.to.y : 8;
        if (tz) tz.value = a.to ? a.to.z : 0;
      }
    }, 50);
  }
  function clearTrigger() { selTrigger = null; document.getElementById('act-editor').style.display = 'none'; renderTriggers(); }
  function updateActUI() {
    const type = document.getElementById('act-type').value;
    const div = document.getElementById('act-params');
    if (type === 'dialog') div.innerHTML = '<textarea id="ad" rows="3" placeholder="Текст діалогу..." style="width:100%;padding:8px;background:var(--surface2);border:1px solid #333;border-radius:6px;color:var(--text);font-size:13px;"></textarea>';
    else if (type === 'setVar') div.innerHTML = '<div class="f-row"><input id="avk" placeholder="Ключ (напр. hasKey)"><input id="avv" placeholder="Значення (напр. true)"></div>';
    else if (type === 'teleport') {
      const opts = project.scenes.map((s, i) => '<option value="' + i + '" ' + (i === scIdx ? 'selected' : '') + '>' + s.name + '</option>').join('');
      div.innerHTML = '<div class="f-row"><label>Сцена</label><select id="asc">' + opts + '</select></div>' +
        '<div class="f-row"><label>Позиція</label><input id="atx" type="number" placeholder="X" value="8" min="0" max="15" style="width:60px;">' +
        '<input id="aty" type="number" placeholder="Y" value="8" min="0" max="15" style="width:60px;">' +
        '<input id="atz" type="number" placeholder="Z" value="0" min="0" max="15" style="width:60px;"></div>';
    }
  }
  function saveTrigger() {
    if (selTrigger === null) return;
    const t = trigs()[selTrigger]; if (!t) return;
    const type = document.getElementById('act-type').value;
    const a = { type };
    if (type === 'dialog') a.text = document.getElementById('ad').value;
    else if (type === 'setVar') { a.key = document.getElementById('avk').value; a.value = document.getElementById('avv').value; }
    else if (type === 'teleport') {
      a.sceneId = parseInt(document.getElementById('asc').value) || 0;
      a.to = { x: parseInt(document.getElementById('atx').value) || 8, y: parseInt(document.getElementById('aty').value) || 8, z: parseInt(document.getElementById('atz').value) || 0 };
    }
    t.actions = [a];
    saveWorld(); renderTriggers();
  }
  function delTrigger(i) {
    trigs().splice(i, 1);
    if (selTrigger === i) clearTrigger(); else renderTriggers();
    saveWorld();
  }
  function chkConds(t) {
    if (!t.conditions || !t.conditions.length) return true;
    return t.conditions.every(c => {
      const v = project.globalVars[c.key];
      if (c.op === '==') return v == c.value;
      if (c.op === '!=') return v != c.value;
      if (c.op === '>') return parseFloat(v) > parseFloat(c.value);
      if (c.op === '<') return parseFloat(v) < parseFloat(c.value);
      return true;
    });
  }

  // ================================================================
  // VARIABLES
  // ================================================================
  function renderVars() {
    const d = document.getElementById('vars-disp');
    d.innerHTML = '';
    const ks = Object.keys(project.globalVars);
    if (!ks.length) { d.innerHTML = '<div class="var-display">(порожньо)</div>'; return; }
    ks.forEach(k => {
      const dv = document.createElement('div');
      dv.className = 'var-display';
      dv.innerHTML = '<span><b>' + k + '</b> = ' + JSON.stringify(project.globalVars[k]) + '</span>' +
        '<span style="color:#f44;cursor:pointer" onclick="delVar(\'' + k + '\')">✕</span>';
      d.appendChild(dv);
    });
  }
  function addVar() {
    const k = document.getElementById('vk').value.trim();
    const v = document.getElementById('vv').value.trim();
    if (!k) return;
    project.globalVars[k] = isNaN(v) ? v : parseFloat(v);
    document.getElementById('vk').value = ''; document.getElementById('vv').value = '';
    renderVars(); saveAll();
  }
  function delVar(k) { delete project.globalVars[k]; renderVars(); saveAll(); }

  // ================================================================
  // PALETTE
  // ================================================================
  function renderPal() {
    const bar = document.getElementById('pal-bar');
    bar.innerHTML = '';
    TILES.forEach(t => {
      const b = document.createElement('div');
      b.className = 'pal-item' + (t === selTile ? ' active' : '');
      if (t === 'empty') b.classList.add('empty');
      else b.style.background = TCOLORS[t];
      b.title = t;
      b.onclick = () => { selTile = t; renderPal(); };
      bar.appendChild(b);
    });
  }

  // ================================================================
  // TOP VIEW EDITING
  // ================================================================
  function setupTopEdit() {
    const sc = document.getElementById('scene');
    if (!sc) return;
    sc.addEventListener('mousedown', e => {
      if (project.view === '3d' || project.view === 'play') return;
      if (window.physics && window.physics.isRunning) return;
      topClick(e);
    });
    sc.addEventListener('touchstart', e => {
      if (project.view === '3d' || project.view === 'play') return;
      if (window.physics && window.physics.isRunning) return;
      if (e.touches.length > 1) return;
      const t = e.touches[0], tg = document.elementFromPoint(t.clientX, t.clientY);
      if (tg) topClick({ target: tg, clientX: t.clientX, clientY: t.clientY });
    }, { passive: true });
  }
  function topClick(e) {
    if (!window.world) return;
    const tg = e.target; if (!tg) return;
    let x, y, z;
    if (tg.classList.contains('face')) {
      const p = tg.parentElement;
      x = parseInt(p.dataset.x); y = parseInt(p.dataset.y); z = parseInt(p.dataset.z);
      const d = tg.dataset.dir;
      if (d === 'top') z++; else if (d === 'bottom') z--;
      else if (d === 'front') y++; else if (d === 'back') y--;
      else if (d === 'right') x++; else if (d === 'left') x--;
    } else if (tg.classList.contains('voxel')) {
      x = parseInt(tg.dataset.x); y = parseInt(tg.dataset.y); z = parseInt(tg.dataset.z);
      window.world.deleteVoxel(x, y, z);
      if (window.renderer) renderer.render();
      return;
    } else if (tg.classList.contains('grid-floor')) {
      if (e.clientX === undefined) return;
      const r = tg.getBoundingClientRect();
      const ox = e.clientX - r.left, oy = e.clientY - r.top;
      const s = window.innerWidth < 600 ? 0.4 : 0.6;
      x = Math.floor(ox / (40 * s)); y = Math.floor(oy / (40 * s)); z = 0;
    } else return;
    if (x < 0 || x >= 16 || y < 0 || y >= 16 || z < 0 || z >= 16) return;
    if (selTile === 'empty') {
      if (window.world.hasVoxel(x, y, z)) {
        const ti = window.world.triggers.findIndex(t => t.tile.x === x && t.tile.y === y && t.tile.z === z);
        if (ti >= 0) window.world.triggers.splice(ti, 1);
        window.world.deleteVoxel(x, y, z);
        if (window.renderer) renderer.render();
        renderTriggers();
      }
    } else {
      window.world.setVoxel(x, y, z, { type: 'solid', color: TCOLORS[selTile] || '#555' });
      if (selTile === 'trigger') {
        window.world.triggers.push({ id: 't' + Date.now(), tile: { x, y, z }, event: 'onEnter', conditions: [], actions: [{ type: 'dialog', text: '...' }] });
        renderTriggers();
      }
      if (window.renderer) renderer.render();
    }
    saveWorld();
  }

  // ================================================================
  // PLAY MODE
  // ================================================================
  function playGame() {
    if (!window.physics) return;
    if (window.renderer) renderer.setViewMode('3d');
    document.getElementById('play-ctrl').style.display = 'flex';
    window.physics.start();
  }
  document.getElementById('btn-stop').addEventListener('click', () => {
    if (window.physics) window.physics.stop();
    document.getElementById('play-ctrl').style.display = 'none';
  });
  document.getElementById('btn-play').addEventListener('click', playGame);

  // ================================================================
  // DIALOG
  // ================================================================
  function showDlg(text, btns) {
    const ov = document.getElementById('dlg-overlay');
    const bx = document.getElementById('dlg-box');
    bx.innerHTML = '<h3>💬</h3><p>' + text + '</p>';
    if (btns) btns.forEach(b => { bx.innerHTML += '<button onclick="closeDlg();' + (b.action || '') + '">' + b.label + '</button>'; });
    else bx.innerHTML += '<button onclick="closeDlg()">OK</button>';
    ov.classList.add('show');
  }
  function closeDlg() { document.getElementById('dlg-overlay').classList.remove('show'); }

  // ================================================================
  // SAVE / LOAD
  // ================================================================
  function saveWorld() {
    if (!window.world || !project.scenes[scIdx]) return;
    project.scenes[scIdx].triggers = JSON.parse(JSON.stringify(window.world.triggers || []));
    try { project.scenes[scIdx].worldJSON = window.world.toJSON(); } catch (e) {}
  }
  function saveAll() {
    saveWorld();
    localStorage.setItem(PROJECT_KEY, JSON.stringify(project));
  }
  function exportAll() {
    saveWorld();
    const b = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b); a.download = 'evo-game.json'; a.click();
  }
  document.getElementById('import-file').addEventListener('change', function(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = function(ev) {
      try {
        project = JSON.parse(ev.target.result);
        if (!project.scenes || !project.scenes.length) project.scenes = [mkScene('Рівень 1')];
        renderScenes(); renderVars(); goScene(0); saveAll();
      } catch (err) { alert('Помилка: ' + err.message); }
    };
    r.readAsText(f);
  });

  // ================================================================
  // INIT
  // ================================================================
  function initApp() {
    renderPal(); renderVars();
    const saved = localStorage.getItem(PROJECT_KEY);
    if (saved) { try { project = JSON.parse(saved); } catch (e) {} }
    if (!project.scenes || !project.scenes.length) project.scenes = [mkScene('Рівень 1')];
    renderScenes(); goScene(project.currentScene || 0); renderVars();
    setupTopEdit();

    // Physics trigger hook
    const wp = setInterval(() => {
      if (window.physics && !window.physics._hooked) {
        window.physics._hooked = true;
        window.physics._checkTriggers = function() {
          if (!this.isRunning || !this.player) return;
          const px = Math.round(this.player.x), py = Math.round(this.player.y), pz = Math.round(this.player.z);
          (window.world.triggers || []).forEach(t => {
            if (t.tile.x === px && t.tile.y === py && t.tile.z === pz && t.event === 'onEnter') {
              if (!chkConds(t)) return;
              if (t.actions && t.actions[0]) {
                const a = t.actions[0];
                if (a.type === 'dialog') showDlg(a.text);
                else if (a.type === 'setVar') { project.globalVars[a.key] = a.value; renderVars(); }
                else if (a.type === 'teleport') {
                  if (a.sceneId !== undefined && a.sceneId !== scIdx) { saveWorld(); goScene(a.sceneId); }
                  if (a.to) { this.player.x = a.to.x; this.player.y = a.to.y; this.player.z = a.to.z; }
                }
              }
              t.event = 'used';
            }
          });
        };
        setInterval(() => { if (window.physics) window.physics._checkTriggers(); }, 200);
      }
    }, 200);

    setInterval(saveAll, 30000);
  }
  </script>
</body>
